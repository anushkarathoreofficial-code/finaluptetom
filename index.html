सकी understanding की जा रही है।", "mnemonic": "Comprehension of written English = read (a)"}, {"id": "p09-0248", "year": "2019", "src": "UPTET 2019", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Choose the correct sentence :", "options": ["Please listen your teacher.", "Please listen towards your teacher.", "Please listen of your teacher.", "Please listen to your teacher."], "answer": 3, "summary": "Structure— Please + V I + preposition + object; 'listen' के साथ 'to' preposition का प्रयोग उपयुक्त होगा।", "mnemonic": "listen TO your teacher (d)"}, {"id": "p09-0249", "year": "2019", "src": "UPTET 2019", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Find out the correct sentence/sentences :", "options": ["I am not believing him.", "Both of the above", "None of the above", "I don't believe him."], "answer": 3, "summary": "Verbs of 'thinking' (think, suppose, believe, agree, remember, understand आदि) सामान्यतः continuous form में प्रयोग नहीं होते, अतः 'I don't believe him.' सही है।", "mnemonic": "Believe -> simple, not continuous = I don't believe him (d)"}, {"id": "p09-0250", "year": "2019", "src": "UPTET 2019", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Which of the following alternatives is grammatically correct?", "options": ["All this men are gentle", "All these man are gentle", "All these mans are gentle", "All these men are gentle"], "answer": 3, "summary": "Countable noun 'man' का Plural form 'men' है, अतः 'All these men are gentle.' grammatically correct है।", "mnemonic": "these MEN are gentle (d)"}, {"id": "p09-0251", "year": "2019", "src": "UPTET 2019", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Fill in the blank with appropriate preposition : He came to me .............. midnight.", "options": ["at", "on", "upon", "in"], "answer": 0, "summary": "किसी निश्चित समय (point of time) के लिए preposition 'at' का प्रयोग होता है, अतः 'He came to me at midnight.' सही है।", "mnemonic": "at midnight (a)"}, {"id": "p09-0252", "year": "2019", "src": "UPTET 2019", "subject": "भाषा-II (अंग्रेज़ी/संस्कृत)", "question": "Which of the following sentence does not have an adjective clause?", "options": ["I love the man who is truthful", "I met him where he lived", "I met him in Prayagraj which is a holy city.", "The man who is truthful is loved by all"], "answer": 1, "summary": "'where' का प्रयोग जब noun clause के रूप में हो तब उसमें adjective clause नहीं होता; विकल्प (b) में 'where' noun clause के रूप में है।", "mnemonic": "Adjective clause = 'who/which/that'; jahan 'where' aaye wahan adjective clause nahi."}, {"id": "p09-0253", "year": "2019", "src": "UPTET 2019", "subject": "भाषा-II (अंग्रेज़ी/संस्कृत)", "question": "Fill in the blank with correct preposition : He is junior ............. me.", "options": ["from", "with", "to", "than"], "answer": 2, "summary": "superior, junior, inferior आदि comparison शब्दों के साथ 'to' preposition का प्रयोग होता है।", "mnemonic": "Junior/senior/superior ke saath hamesha 'to'."}, {"id": "p09-0254", "year": "2019", "src": "UPTET 2019", "subject": "भाषा-II (अंग्रेज़ी/संस्कृत)", "question": "Fill in the blank with correct conjunction : Either he is mad ............. he feigns madness.", "options": ["and", "nor", "or", "with"], "answer": 2, "summary": "Either के साथ correlative conjunction 'or' का प्रयोग होता है।", "mnemonic": "Either... or, Neither... nor — Either ke saath 'or'."}, {"id": "p09-0255", "year": "2019", "src": "UPTET 2019", "subject": "भाषा-II (अंग्रेज़ी/संस्कृत)", "question": "The word strength is :", "options": ["Material noun", "Abstract noun", "Collective noun", "Common noun"], "answer": 1, "summary": "Strength एक Abstract noun है क्योंकि भावात्मक संज्ञा किसी गुण, प्रिय, विषय आदि का बोध कराती है।", "mnemonic": "Strength = quality/gun, isliye Abstract noun."}, {"id": "p09-0256", "year": "2019", "src": "UPTET 2019", "subject": "भाषा-II (अंग्रेज़ी/संस्कृत)", "question": "One who does not take revenge is :", "options": ["a strong man", "a foolish man", "a fool", "a weak man"], "answer": 0, "summary": "जो बदला नहीं लेता वह वास्तव में शक्ति का प्रतीक है, अतः one who does not take revenge means strong man.", "mnemonic": "Badla na lene wala = strong man (forgiveness is strength)."}, {"id": "p09-0257", "year": "2019", "src": "UPTET 2019", "subject": "भाषा-II (अंग्रेज़ी/संस्कृत)", "question": "What is the meaning of the word 'untrodden'?", "options": ["Explored", "Hidden", "Explicit", "Unexplored"], "answer": 3, "summary": "Untrodden का सही अर्थ 'Unexplored' (अव्याख्यायित/अछूता) होता है।", "mnemonic": "Untrodden = un-trodden path = Unexplored."}, {"id": "p09-0258", "year": "2019", "src": "UPTET 2019", "subject": "भाषा-II (अंग्रेज़ी/संस्कृत)", "question": "Identify the correct figure of speech used in the second stanza.", "options": ["Pun", "Alliteration", "Simile", "Metaphor"], "answer": 2, "summary": "दूसरे Stanza में 'as' का प्रयोग होने से यह Simile है, जो सीधे दो भिन्न वस्तुओं की तुलना 'as' से करता है।", "mnemonic": "'as/like' aaye toh Simile."}, {"id": "p09-0259", "year": "2019", "src": "UPTET 2019", "subject": "भाषा-II (अंग्रेज़ी/संस्कृत)", "question": "Which of the following sentence/sentences is/are correct?", "options": ["There is few hope of his recovery.", "He showed few concern for his nephew.", "He showed little mercy to the vanquished.", "Only (C)"], "answer": 2, "summary": "Few का प्रयोग countable nouns के पहले, little का uncountable nouns के पहले negative sense में होता है; अतः 'little mercy' सही है।", "mnemonic": "Few = countable, Little = uncountable; mercy uncountable toh 'little'."}, {"id": "p09-0260", "year": "2019", "src": "UPTET 2019", "subject": "भाषा-II (अंग्रेज़ी/संस्कृत)", "question": "Point out the sentence which is in past perfect tense.", "options": ["I had written my letter before he arrived.", "We were listening to the radio all evening.", "It was getting darker.", "He studied many hours everyday."], "answer": 0, "summary": "Past perfect tense का structure Sub + had + V III form + object होता है, जो विकल्प (a) में है।", "mnemonic": "Had + V3 = past perfect; 'had written'."}, {"id": "p09-0261", "year": "2019", "src": "UPTET 2019", "subject": "भाषा-II (अंग्रेज़ी/संस्कृत)", "question": "Fill in the blank with the correct article : Neil Armstrong was ............. first man to walk on ............. moon.", "options": ["an, the", "the, the", "an, a", "a, the"], "answer": 1, "summary": "Ordinal adjective के पहले article 'the' तथा अद्वितीय वस्तु moon के पहले भी 'the' का प्रयोग होता है।", "mnemonic": "first = the; moon = the; 'the, the'."}, {"id": "p09-0262", "year": "2019", "src": "UPTET 2019", "subject": "भाषा-II (अंग्रेज़ी/संस्कृत)", "question": "Fill in the blank in the following sentence : The teacher has been teaching for ............. hour.", "options": ["an", "a", "two", "three"], "answer": 0, "summary": "Hour शब्द में vowel sound का उच्चारण होता है, अतः इसके पहले 'an' article का प्रयोग होता है।", "mnemonic": "Hour ki 'h' silent = vowel sound, isliye 'an'."}, {"id": "p09-0263", "year": "2019", "src": "UPTET 2019", "subject": "भाषा-II (अंग्रेज़ी/संस्कृत)", "question": "Add the right suffix to pluralize the word 'Ox'.", "options": ["es", "ies", "s", "en"], "answer": 3, "summary": "'Ox' में suffix 'en' जोड़कर plural बनाते हैं — Oxen होता है।", "mnemonic": "Ox + en = Oxen (irregular plural)."}, {"id": "p09-0264", "year": "2019", "src": "UPTET 2019", "subject": "भाषा-II (अंग्रेज़ी/संस्कृत)", "question": "Change the word 'grow' into a noun by adding one of the suffixes given below.", "options": ["th", "ng", "ng", "ing"], "answer": 0, "summary": "verb 'grow' में suffix 'th' जोड़कर noun (growth) बनाते हैं।", "mnemonic": "grow + th = growth (noun)."}, {"id": "p09-0265", "year": "2019", "src": "UPTET 2019", "subject": "संस्कृत (भाषा-II)", "question": "संस्कृत के 'एकोनम चत्वारिंशत्' को कहते हैं?", "options": ["39", "29", "59", "49"], "answer": 0, "summary": "संस्कृत में एकोनम चत्वारिंशत् को 39 कहते हैं (एकोनचत्वारिंशत् / नवत्रिंशतिः)।", "mnemonic": "Eko-nam-chatvarinshat = 40 se ek kam = 39." norath; visarg sandhi."}, {"id": "p09-0271", "year": "2019", "src": "UPTET 2019", "subject": "संस्कृत (भाषा-II)", "question": "''नेत्राभ्याम् अश्रूणि पतन्ति'' में नेत्राभ्याम् पद में विभक्ति है?", "options": ["द्वितीया", "पञ्चमी", "सप्तमी", "षष्ठी"], "answer": 1, "summary": "'नेत्राभ्याम् अश्रूणि पतन्ति' में नेत्राभ्याम् में पञ्चमी विभक्ति है क्योंकि नेत्र से अश्रु का अलगाव होने के कारण ध्रुवमपायेऽपादानम् सूत्र से पञ्चमी प्रयुक्त है।", "mnemonic": "Netra se ashru alag (apaadaan) = Panchami vibhakti."}, {"id": "p09-0272", "year": "2019", "src": "UPTET 2019", "subject": "संस्कृत (भाषा-II)", "question": "'अशनि' शब्द है?", "options": ["स्त्रीलिङ्ग", "नपुंसक लिङ्ग", "उपर्युक्त सभी", ""], "answer": 0, "summary": "'अशनि' शब्द पुल्लिङ्ग है, जिसका अर्थ है- 1. बिजली, गाज 2. वज्र; आयोग ने 'अशनि' शब्द को स्त्रीलिङ्ग एवं पुल्लिङ्ग दोनों माना है।", "mnemonic": "Ashani = bijli/vajra; pulling (aur stri-ling dono)."}, {"id": "p09-0273", "year": "2019", "src": "UPTET 2019", "subject": "संस्कृत (भाषा-II)", "question": "'तथा नृपोऽनुगम्यते' में वाच्य है?", "options": ["कर्मवाच्य", "भाववाच्य", "उपर्युक्त में से कोई नहीं", "कर्तृवाच्य"], "answer": 0, "summary": "'तथा नृपोऽनुगम्यते' में कर्मवाच्य होता है; इसमें कर्म प्रधान होता है और वचन कर्म के अनुसार होते हैं।", "mnemonic": "Karm pradhan = Karmvachya; nrip (karm) anugamyate."}, {"id": "p09-0274", "year": "2019", "src": "UPTET 2019", "subject": "संस्कृत (भाषा-II)", "question": "'यूपदारुः' पद में समास है?", "options": ["बहुव्रीहिः", "द्वन्द्वः", "तत्पुरुषः", "अव्ययीभावः"], "answer": 2, "summary": "'यूपदारुः' में तत्पुरुष समास है (तत्पुरुषसमासः-उत्तरपदार्थप्रधानस्तत्पुरुषः); यूपदारु चतुर्थी तत्पुरुष समास का उदाहरण है।", "mnemonic": "Yupdaruh = Tatpurush samaas (uttarpad pradhan)."}, {"id": "p09-0275", "year": "2019", "src": "UPTET 2019", "subject": "संस्कृत (भाषा-II)", "question": "'गोधुग्' शब्द का अर्थ है?", "options": ["चावल", "गेहूँ", "गदहा", "गाय का दूध"], "answer": 1, "summary": "'गोधुग्' शब्द का अर्थ 'गेहूँ' है (चावल- तण्डुलम्, गेहूँ- ubject": "संस्कृत (भाषा-II)", "question": "अकारान्त पुल्लिङ्ग शब्द का उदाहरण है?", "options": ["गाय्", "रामः", "फलम्", "भानुः"], "answer": 1, "summary": "रामः अकारान्त पुल्लिङ्ग शब्द का उदाहरण है (फलम्- मकारान्त नपुंसकलिङ्ग, भानुः- उकारान्त पुल्लिङ्ग)।", "mnemonic": "Ramah = akaarant pulling udaharan."}, {"id": "p09-0282", "year": "2019", "src": "UPTET 2019", "subject": "संस्कृत (भाषा-II)", "question": "'प्रेजते' में सन्धि है?", "options": ["वृद्धि", "पूर्वरूप", "परसवर्ण", "गुण"], "answer": 2, "summary": "'प्रेजते' में परसवर्ण सन्धि है; अकारान्त उपसर्ग के बाद 'ए' या 'ओ' होने पर अकार के स्थान पर परसवर्ण (अर्थात् ए या ओ) हो जाता है (प्र + एजते = प्रेजते)।", "mnemonic": "Pra + ejate = prejate; parasavarn sandhi."}, {"id": "p09-0283", "year": "2019", "src": "UPTET 2019", "subject": "संस्कृत (भाषा-II)", "question": "'च' वर्ण का उच्चारण स्थान है?", "options": ["दन्त", "ओष्ठ", "तालु", "दन्तोष्ठ"], "answer": 2, "summary": "'च' वर्ण का उच्चारण स्थान तालु (चकारस्य तालुस्थानम्) है; तालव्य- इचुयशानां तालुः।", "mnemonic": "Cha varg = Talavya (talu se ucharan)."}, {"id": "p09-0284", "year": "2019", "src": "UPTET 2019", "subject": "संस्कृत (भाषा-II)", "question": "घटने के लिए उपयुक्त संस्कृत शब्द है?", "options": ["जतु", "ऊरु", "जघन", "हनु"], "answer": 2, "summary": "घटने के लिए संस्कृत में जघन (जंघा) शब्द उपयुक्त है (जतु- घुटना, ऊरु- जंघा, हनु- ठुड्डी)।", "mnemonic": "Ghutna = Jaghan (jangha)."}, {"id": "p09-0285", "year": "2019", "src": "UPTET 2019", "subject": "भाषा-II (अंग्रेज़ी/संस्कृत)", "question": "उपर्युक्त गद्य के अनुसार समाज में किसकी संख्या कम है?", "options": ["शिवाजी की", "गुणी की", "दुर्जनों की", "सज्जनों की"], "answer": 1, "summary": "गद्यांश के अनुसार 'दुर्जन' की संख्या कम है क्योंकि संसार अधिक तो यदि-समय में सजनों की संख्या अधिक होती है; गुणी की संख्या कम है।", "mnemonic": "Gunee kam, isliye 'b' guni"}, {"id": "p09-0286", "year": "2019", "src": "UPTET 2019", "subject": "भाषा-II (अंग्रेज़ी/संस्कृत)", "question": "उपर्युक्त गद्य के अनुसार दुष्ट लोग समाज में क्यों प हाथी", "हिरण", "गुञ्जर", "सर्प"], "answer": 0, "summary": "'कुञ्जर' शब्द का अर्थ 'हाथी' होता है।", "mnemonic": "Kunjar = haathi, 'a'"}, {"id": "p09-0292", "year": "2019", "src": "UPTET 2019", "subject": "भाषा-II (अंग्रेज़ी/संस्कृत)", "question": "'मातृ' शब्द का तृतीया विभक्ति एकवचन में रूप होता है", "options": ["मातया", "माता", "मात्रा", "मातवा"], "answer": 2, "summary": "'मातृ' शब्द का तृतीया विभक्ति एकवचन में रूप 'मात्रा' होता है।", "mnemonic": "Trutiya ekvachan matr = maatra, 'c'"}, {"id": "p09-0293", "year": "2019", "src": "UPTET 2019", "subject": "भाषा-II (अंग्रेज़ी/संस्कृत)", "question": "सुबन्धु की रचना है", "options": ["वासवदत्ता", "मेघदूतम्", "अभिज्ञानशाकुन्तलम्", "स्वप्नवासवदत्तम्"], "answer": 0, "summary": "वासवदत्ता सुबन्धु की रचना है; मेघदूतम् कालिदास, अभिज्ञानशाकुन्तलम् कालिदास तथा स्वप्नवासवदत्तम् भास की रचना है।", "mnemonic": "Subandhu = Vasavdatta, 'a'"}, {"id": "p09-0294", "year": "2019", "src": "UPTET 2019", "subject": "भाषा-II (अंग्रेज़ी/संस्कृत)", "question": "निम्नलिखित में से कौन -सा स्वर है?", "options": ["यृ", "ख", "उपर्युक्त में से कोई नहीं", "ङ"], "answer": 1, "summary": "संस्कृत में स्वरों की संख्या नौ है; अघ् प्रत्याहार सभी स्वरों का बोधक है - अ, इ, उ, ऋ, ल, ए, ओ, ऐ, औ।", "mnemonic": "Khh swar hai, 'b'"}, {"id": "p09-0295", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "Diagonal of a rectangular field is 17 metre and perimeter is 46 metre then the area of the field will be : / किसी आयताकार खेत का विकर्ण 17 मीटर तथा परिमाप 46 मीटर है तो खेत का क्षेत्रफल होगा–", "options": ["120 m²/मी²", "132 m²/मी²", "289 m²/मी²", "112 m²/मी²"], "answer": 0, "summary": "विकर्ण 17, परिमाप 46 से l+b=23, l-b=±7 हल करने पर b=8 और क्षेत्रफल = l×b = 120 m²।", "mnemonic": "120 area, 'a' answer"}, {"id": "p09-0296", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "On simplification {(2⁻¹)}⁻¹, the number will be : / {(2⁻¹)}⁻¹ के सरलीकरण से प्राप्त संख्या होगी–", "options": ["B, C, D", "A, C, D", "C, B, D", "A, B, C"], "answer": 3, "summary": "{(2⁻¹)}⁻¹ का सरल मान 2 है; 2 एक छोटी अभाज्य संख्या, सम संख्या और 2/2 का गुणक है।", "mnemonic": "2 = small prime, even, multiple of 2/2 → A,B,C, 'd'"}, {"id": "p09-0297", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "Which one is correct in the following statements? / निम्नलिखित में से कौन -सा कथन सही है?", "options": ["Least prime number 1 है। / सबसे छोटी अभाज्य संख्या 1 है।", "A composite number may be odd number / एक भाज्य संख्या विषम हो सकती है।", "Even prime number does not exist / कोई सम अभाज्य संख्या नहीं है।", "Sum of two prime numbers always prime number / दो अभाज्य संख्याओं का योगफल सदैव अभाज्य संख्या होती है।"], "answer": 1, "summary": "एक भाज्य (composite) संख्या विषम हो सकती है, जैसे 9, 15, 21; अतः कथन (b) सही है।", "mnemonic": "Bhajya vishom ho sakti, 'b'"}, {"id": "p09-0298", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "The difference between the interior and exterior angles of a regular polygon is 60°. The number of sides in the polygon is : / एक बहुभुज के अन्तः एवं बाह्य कोणों का अंतर 60° है तो बहुभुज में भुजाओं की संख्या है–", "options": ["5", "6", "3", "4"], "answer": 1, "summary": "बहुभुज के अन्तः कोण (n-2)180°/n और बाह्य कोण 360°/n का अंतर 60° रखने पर n=6 प्राप्त होता है।", "mnemonic": "Antar 60 → 6 bhujaye, 'b'"}, {"id": "p09-0299", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "The number of points present on a straight line is : / एक सरल रेखा पर स्थित बिन्दुओं की संख्या होती है–", "options": ["0", "2", "1", "infinite/असंख्य"], "answer": 3, "summary": "किसी भी सरल रेखा पर असंख्य बिन्दु हो सकते हैं।", "mnemonic": "Sarl rekha = asankhya, 'd'"}, {"id": "p09-0300", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "Find pythagorean triplet of which smallest number is 8 / एक पाइथागोरस त्रिक ज्ञात कीजिए, जिसकी सबसे छोटी संख्या 8 है–", "options": ["8, 15, 17", "8, 9, 10", "8, 64, 512", "6, 8, 10"], "answer": 0, "summary": "पाइथागोरस त्रिक में 8²+15²=17² (64+225=289) सत्य है, अतः सबसे छोटी संख्या 8 वाला त्रिक 8,15,17 है।", "mnemonic": "8-15-17 triplet, 'a'"}, {"id": "p09-0301", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "Find the value of Z for which the number 417Z8 is divisible by 9. / Z का मान ज्ञात कीजिए, यदि संख्या 417Z8, 9 से विभाज्य हो।", "options": ["6", "7", "9", "8"], "answer": 1, "summary": "9 से विभाज्यता के नियमानुसार 4+1+7+Z+8=20+Z का योग 9 का गुणज होना चाहिए; Z=7 लेने पर 27 प्राप्त होता है।", "mnemonic": "Yog 27 → Z=7, 'b'"}, {"id": "p09-0302", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "If 2160 = 2ᵃ × 3ᵇ × 5ᶜ, then find the value of 3ᵃ × 2⁻ᵇ × 5⁻ᶜ. / यदि 2160 = 2ᵃ × 3ᵇ × 5ᶜ, तो 3ᵃ × 2⁻ᵇ × 5⁻ᶜ का मान ज्ञात कीजिए।", "options": ["0", "81/40", "37/39", "1/2"], "answer": 1, "summary": "2160 = 2⁴×3³×5¹ अर्थात a=4, b=3, c=1; मान रखने पर 3⁴×2⁻³×5⁻¹ = 81/40 प्राप्त होता है।", "mnemonic": "81 over 40, 'b'"}, {"id": "p09-0303", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "Find using side figure; the value of x is : / पार्श्व आकृति द्वारा ज्ञात करें, x का मान है–", "options": ["1", "5", "6", "0"], "answer": 0, "summary": "दिए गए चित्र में यह ज्ञात होता है कि अंकों के सम्मुख दी गई संख्या घन के रूप में है; 1³=1 अतः x=1।", "mnemonic": "1 ka ghan = 1, 'a'"}, {"id": "p09-0304", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "Mode of distribution can be obtained from / किसी बंटन का बहुलक ज्ञात किया जा सकता है–", "options": ["Less than type ogives / 'से कम' संचयी बारम्बारता वक्र द्वारा", "More than type ogives / 'से अधिक' संचयी बारम्बारता वक्र द्वारा", "Frequency polygon/आवृत्ति बहुभुज द्वारा", "Histogram/आयत चित्र द्वारा"], "answer": 3, "summary": "किसी बंटन का बहुलक आयत चित्र (Histogram) द्वारा ज्ञात किया जा सकता है।", "mnemonic": "Mode = Histogram, 'd'"}, {"id": "p09-0305", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "The length of rectangle is increased by 60% by what percent would the width have to be decreased to maintain the same area? / एक आयत की लम्बाई में 60% की वृद्धि करने पर उसकी चौड़ाई में कितने प्रतिशत की कमी करनी होगी जिससे आयत का क्षेत्रफल न बदले?", "options": ["75.5%", "125%", "37.5%", "50%"], "answer": 2, "summary": "लम्बाई में 60% वृद्धि पर चौड़ाई में कमी = 100×x/(100+x) = 6000/160 = 37.5% होगी।", "mnemonic": "60% badha → 37.5% kam, 'c'"}, {"id": "p09-0306", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "The volume of a cube is numerically equal to sum of the length of its edges. The total surface area of a cube in square units is : / एक घन का आयतन संख्यात्मक रूप में उसकी भुजाओं की लम्बाई के योग के बराबर है। घन का सम्पूर्ण पृष्ठीय क्षेत्रफल वर्ग इकाई में है–", "options": ["64.5", "72.0", "44.2", "12.4"], "answer": 1, "summary": "घन का आयतन a³ और 12 भुजाओं का योग 12a; a³=12a से a²=12, अतः सम्पूर्ण पृष्ठ 6a²=6×12=72 वर्ग इकाई।", "mnemonic": "72 surface area, 'b'"}, {"id": "p09-0307", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "Amit's salary in 2018 is Rs. 1,26,500. His salary for 2016 has risen annually by 10% and 15% respectively to reach 2018 salary figures. What was his salary in 2016? / 2018 में अमित का वेतन रूपये 1,26,500 है। वर्ष 2016 से उसका वेतन प्रतिवर्ष क्रमशः 10% व 15% बढ़कर 2018 के वेतन तक पहुँच गया। वर्ष 2016 में उसका वेतन कितना था?", "options": ["Rs. 1,15,000", "Rs. 1,00,000", "Rs. 1,25,000", "Rs. 95,000"], "answer": 1, "summary": "1,26,500 = x×(110/100)×(115/100) हल करने पर 2016 में अमित का वेतन रू 1,00,000 था।", "mnemonic": "Wapas chalo → 1 lakh, 'b'"}, {"id": "p09-0308", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "दो संख्याओं का महत्तम समापवर्तक 6 तथा लघुत्तम समापवर्तक 432 है। यदि एक संख्या 48 है तो दूसरी संख्या है-", "options": ["27", "42", "54", "52"], "answer": 1, "summary": "म.स. × ल.स. = प्रथम संख्या × दूसरी संख्या, अतः दूसरी संख्या = (6×432)/48 = 54। (मुद्रित उत्तर b)", "mnemonic": "HCF*LCM = a*b; 6*432/48 nikaalo"}, {"id": "p09-0309", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "किसी महीने का तीसरा शुक्रवार 16वीं तारीख को पड़ता है तो उसी महीने का चौथा मंगलवार किस तारीख को पड़ेगा?", "options": ["22", "27", "29", "20"], "answer": 3, "summary": "तीसरा शुक्रवार 16 तारीख, अतः पहला शुक्रवार 2, पहला मंगलवार 6 और चौथा मंगलवार 20 तारीख को पड़ेगा।", "mnemonic": "3rd Friday 16 to 4th Tuesday 20"}, {"id": "p09-0310", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "यदि (a+b)/c = (b+c)/a = (c+a)/b = K, हो तो K का मान है-", "options": ["2", "1/2", "3/2", "1"], "answer": 0, "summary": "तीनों समीकरण जोड़ने पर 2(a+b+c)=K(a+b+c), अतः K=2।", "mnemonic": "Saare jodo, K = 2"}, {"id": "p09-0311", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "निम्नलिखित में से कोई 3 मापों का लेकर कुल कितने त्रिभुज बनाये जा सकते हैं? भुजा की माप 1.2 सेमी., 4.2 सेमी., 5.9 सेमी और 8.1 सेमी है-", "options": ["Two/दो", "Three/तीन", "Four/चार", "One/एक"], "answer": 3, "summary": "त्रिभुज की दो छोटी भुजाओं का योग तीसरी भुजा से बड़ा होना चाहिए; केवल 4.2, 5.9 व 8.1 सेमी से एक ही त्रिभुज बनता है।", "mnemonic": "Sirf ek triangle banta hai"}, {"id": "p09-0312", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "एक भिन्न का हर, अंश के दोगुने से 1 अधिक है। अंश में 2 जोड़ने और हर में 3 घटाने पर संख्या 1 प्राप्त होती है। मूल भिन्न ज्ञात कीजिए-", "options": ["1/9", "2/5", "1/3", "4/9"], "answer": 3, "summary": "अंश x मानने पर हर 2x+1; (x+2)/(2x-2)=1 हल करने पर x=4, अतः मूल भिन्न 4/9।", "mnemonic": "x=4, fraction 4/9"}, {"id": "p09-0313", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "सरल कीजिए (-9)÷{(-8)+(24÷ 13-7)}", "options": ["-5", "-8", "None of these/इनमें से कोई नहीं", "5"], "answer": 0, "summary": "BODMAS से (-9)÷{(-8)+(24÷6)} = (-9)÷{-8+4} = (-9)÷(-4)... मुद्रित उत्तर -5 (विकल्प a)।", "mnemonic": "BODMAS lagao, answer -5"}, {"id": "p09-0314", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "यदि म.स. (a, 8) = 4 और ल.स. (a, 8) = 24 हो, तो 'a' का मान है-", "options": ["12", "14", "8", "10"], "answer": 0, "summary": "म.स.(a,8)=4 व ल.स.(a,8)=24, अतः a का मान 12 है।", "mnemonic": "a = 12"}, {"id": "p09-0315", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "एक कमरे की लम्बाई 10% घटायी गयी तथा चौड़ाई 20% घटायी गयी जबकि ऊँचाई 5% बढ़ायी गयी। इस प्रकार कमरे के आयतन में कितने प्रतिशत का परिवर्तन हुआ?", "options": ["24.2%", "24%", "24.6%", "24%"], "answer": 0, "summary": "लगातार प्रतिशत परिवर्तन सूत्र से कमरे के आयतन में कुल 24.4% की कमी, मुद्रित उत्तर 24.2% (विकल्प b)।", "mnemonic": "Volume mein ~24% kami"}, {"id": "p09-0316", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "किसी कमरे के 15 मी. 17 सेमी लम्बे और 9 मी. 2 सेमी. चौड़े फर्श पर लगाने वाली वर्गाकार टाइलों की न्यूनतम संख्या कितनी है?", "options": ["820", "841", "840", "814"], "answer": 3, "summary": "लम्बाई 1517 सेमी व चौड़ाई 902 सेमी का म.स. 41 सेमी; टाइलों की न्यूनतम संख्या (1517×902)/(41×41) = 814।", "mnemonic": "Tile size 41, count 814"}, {"id": "p09-0317", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "गुणनफल (2153)167 में इकाई का अंक क्या होगा-", "options": ["3", "7", "9", "1"], "answer": 1, "summary": "167÷4 करने पर शेषफल 3 आता है, अतः इकाई का अंक (3)^3 = 27 का अंतिम अंक 7।", "mnemonic": "167 mod 4 = 3, 3^3 = 7"}, {"id": "p09-0318", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "यदि एक भिन्न के अंश को 20% और हर को 25% बढ़ा दिया जाए, तो भिन्न 3/5 हो जाता है, तो मूल भिन्न है-", "options": ["5/8", "8/5", "8/3", "3/8"], "answer": 0, "summary": "भिन्न x/y मानकर (1.20x)/(1.25y)=3/5 हल करने पर 8x=5y, अतः मूल भिन्न 5/8।", "mnemonic": "8x=5y, original 5/8"}, {"id": "p09-0319", "year": "2019", "src": "UPTET 2019", "subject": "गणित (Math)", "question": "8 से भाज्य होने वाली संख्याएँ हैं- i. 5240 n": "Which country has a flexible Constitution? किस देश में लचीला संविधान लागू है?", "options": ["China/चीन", "America/अमेरिका", "United Kingdom/यूनाइटेड किंगडम", "India/भारत"], "answer": 2, "summary": "यूनाइटेड किंगडम में लचीला संविधान लागू है क्योंकि वहाँ संविधान अलिखित है और इसमें आसानी से संशोधन किया जा सकता है।", "mnemonic": "Flexible = UK, kyunki likha hi nahi (unwritten)"}, {"id": "p09-0330", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "In which of the following regions Reindeer are found? निम्नलिखित में से किस प्रदेश में रेंडियर पाया जाता है?", "options": ["Hot Desert/गर्म मरुस्थल", "Monsoon/मानसून", "Taiga/टैगा", "Tundra/टुण्ड्रा प्रदेश"], "answer": 3, "summary": "रेंडियर टुण्ड्रा प्रदेश में पाया जाता है; ठण्डे टुण्ड्रा प्रदेश के निवासियों के लिए परिवहन और मांस-दूध हेतु यह उपयोगी है।", "mnemonic": "Reindeer = Tundra, dono cold se shuru"}, {"id": "p09-0331", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Which one of the following is not a temperate grassland? निम्नलिखित में से कौन-सा एक शीतोष्ण घास प्रदेश नहीं है?", "options": ["Compas/कम्पास", "Downs/डाउन्स", "Prairies/प्रेयरीज", "Pampus/पम्पस"], "answer": 0, "summary": "शीतोष्ण घास प्रदेशों में डाउन्स, प्रेयरीज, पम्पस आदि शामिल हैं; कम्पास शीतोष्ण घास प्रदेश नहीं है।", "mnemonic": "Compas nahi hai grassland, baaki teen DPP hai"}, {"id": "p09-0332", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "According to population size, the largest Continent is जनसंख्या के आकार के अनुसार सबसे बड़ा महाद्वीप है—", "options": ["North America/उत्तरी अमेरिका", "Asia/एशिया", "Africa/अफ्रीका", "Europe/यूरोप"], "answer": 1, "summary": "जनसंख्या के आकार के अनुसार एशिया सबसे बड़ा महाद्वीप है, जहाँ विश्व की सर्वाधिक जनसंख्या निवास करती है।", "mnemonic": "Sabse zyada log = Asia"}, {"id": "p09-0333", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Where does Tharu tribe live in India? भारत में थारू जनजाति कहाँ निवास करती है?", "options": ["Tarai region of Uttar Pradesh उत्तर प्रदेश के तराई क्षेत्र में", "Uttarakhand/उत्तराखण्ड में", "Jharkhand/झारखण्ड में", "Thar Desert/थार मरुस्थल में"], "answer": 0, "summary": "थारू जनजाति मुख्यतः उत्तर प्रदेश के तराई क्षेत्र तथा उत्तराखण्ड में निवास करती है; आयोग ने (a & b) दोनों को सही माना है।", "mnemonic": "Tharu = Tarai (UP), naam mein hi T-T"}, {"id": "p09-0334", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Bhilai Steel Plant is situated in भिलाई इस्पात संयंत्र स्थित है—", "options": ["Jharkhand/झारखण्ड में", "Chhattisgarh/छत्तीसगढ़ में", "Odisha/ओडिशा में", "Madhya Pradesh/मध्य प्रदेश में"], "answer": 1, "summary": "भिलाई इस्पात संयंत्र छत्तीसगढ़ में स्थित है, जो भारत का पहला इस्पात उत्पादन संयंत्र है तथा सोवियत संघ की सहायता से स्थापित किया गया था।", "mnemonic": "Bhilai = Chhattisgarh, dono Bha/Chh se feel"}, {"id": "p09-0335", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Reservation for women in India is available in भारत में महिलाओं के लिए आरक्षण की व्यवस्था कहाँ है?", "options": ["Vidhan Sabha/विधान सभा में", "Cabinet/मंत्रिमण्डल में", "Panchayati Raj Institutions/पंचायती राज संस्थाओं में", "Lok Sabha/लोक सभा में"], "answer": 2, "summary": "भारत में महिलाओं के लिए आरक्षण की व्यवस्था पंचायती राज संस्थाओं में है, जहाँ कुल सीटों का एक-तिहाई महिलाओं के लिए आरक्षित है।", "mnemonic": "Women reservation = Panchayati Raj (1/3 seats)"}, {"id": "p09-0336", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "In order to be appointed as the Governor of a State, one must have attained the age of किसी राज्य के राज्यपाल की नियुक्ति के लिए व्यक्ति की कम-से-कम आयु होनी चाहिए?", "options": ["45 years/45 वर्ष", "50 years/50 वर्ष", "30 years/30 वर्ष", "35 years/35 वर्ष"], "answer": 3, "summary": "राज्यपाल बनने के लिए व्यक्ति की न्यूनतम आयु 35 वर्ष होनी चाहिए तथा उसे भारत का नागरिक होना चाहिए।", "mnemonic": "Governor = 35 saal minimum"}, {"id": "p09-0337", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Choose the right Code after comparing List-I with List-II सूची-I और सूची-II का सुमेलन करके इसे सही कूट चुनें—", "options": ["A-2 B-1 C-4 D-3", "A-3 B-4 C-1 D-2", "A-3 B-4 C-2 D-1", "A-4 B-1 C-2 D-3"], "answer": 1, "summary": "सूची-I (Indian Union/राज्य/Corporation/Village Panchayat) का सूची-II (Prime Minister/Sarpanch/Governor/Mayor) से सही मिलान A-3, B-4, C-1, D-2 है।", "mnemonic": "Union-PM, State-Sarpanch hai trick wala, code 3-4-1-2"}, {"id": "p09-0338", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "When and where, Article 356 was used first? अनुच्छेद 356 का प्रथम प्रयोग कब और कहाँ हुआ?", "options": ["Kerala 1959/केरल 1959", "Jammu and Kashmir 1956 जम्मू और कश्मीर 1956", "Madhya Pradesh 1957/मध्य प्रदेश 1957", "Bihar 1958/बिहार 1958"], "answer": 0, "summary": "अनुच्छेद 356 का प्रथम प्रयोग 1959 में केरल में हुआ, जिसके अंतर्गत केंद्र सरकार राज्य में राष्ट्रपति शासन लागू कर सकती है।", "mnemonic": "Article 356 first = Kerala 1959"}, {"id": "p09-0339", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Which tax can be imposed by Nagar Nigam? नगर निगम द्वारा कौन-सा कर लगाया जा सकता है?", "options": ["House Tax/गृह कर", "Toll Tax/चुंगी कर", "Entertainment Tax/मनोरंजन कर", "All the above/उपरोक्त सभी"], "answer": 3, "summary": "नगर निगम गृह कर, चुंगी कर, मनोरंजन कर आदि सभी प्रकार के कर लगा सकता है, क्योंकि यह स्थानीय स्वशासन व्यवस्था है।", "mnemonic": "Nagar Nigam = sab tax (All the above)"}, {"id": "p09-0340", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "The world's most problematic aquatic weed, also known as \"Terror of Bengal\" is संसार का सर्वाधिक समस्याकारी जलीय खरपतवार, जिसे 'बंगाल का आतंक' भी कहते हैं, वह है—", "options": ["Parthenium hysterophorus (Congress grass) पार्थीनियम हिस्टैरोफोरस (कांग्रेस घास)", "Eichhornia Crassipes (Water hyacinth) एकोर्निया क्रैसिपेस (जलकुम्भी)", "Cynodone dactylon (Doob grass) सिनोडोन डेक्टाइलोन (दूब घास)", "Lantana Camara (लैंटाना कैमरा)"], "answer": 1, "summary": "जलकुम्भी (Eichhornia Crassipes) विश्व का सर्वाधिक समस्याकारी जलीय खरपतवार है, जिसे 'बंगाल का आतंक' कहा जाता है।", "mnemonic": "Terror of Bengal = Jalkumbhi (Water hyacinth)"}, {"id": "p09-0341", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "The abiotic property of a lake is वाइरस के अजैविक होने का लक्षण है—", "options": ["It does not have protein इसमें प्रोटीन नहीं पाया जाता", "It cannot reproduce यह प्रजनन नहीं कर सकता", "It can be crystalized इसको क्रिस्टल के रूप में परिवर्तित किया जा सकता है", "It does not have the genetic material इसमें वंशानुगत पदार्थ नहीं पाया जाता"], "answer": 2, "summary": "वाइरस को क्रिस्टल के रूप में परिवर्तित किया जा सकता है, जो इसके अजैविक (निर्जीव) होने का लक्षण है।", "mnemonic": "Virus crystal ban jaata = abiotic (non-living)"}, {"id": "p09-0342", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Plant hormone that help in the ripening of fruits is फलों को पकाने में सहायता करता है—", "options": ["Gibberellins/जिबरेलिन्स", "Cytokinin/साइटोकाइनिन", "Ethylene/एथिलीन", "Auxin/ऑक्सिन"], "answer": 2, "summary": "एथिलीन एक पादप हार्मोन है जो फलों को पकाने में सहायता करता है; यह एकमात्र गैसीय हार्मोन है।", "mnemonic": "Fruit ripening = Ethylene gas"}, {"id": "p09-0343", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Free living, anaerobic, nitrogen (N₂) fixing bacteria found in soil is स्वतंत्र रूप से भूमि में रहने वाला अवायवीय जीवाणु जिसमें नाइट्रोजन (N₂) नियतीकरण की क्षमता होती है, वह है—", "options": ["Rhizobium/राइजोबियम", "Clostridium/क्लोस्ट्रीडियम", "Vibrio/विब्रियो", "Azotobacter/एजोटोबैक्टर"], "answer": 1, "summary": "क्लोस्ट्रीडियम स्वतंत्र रूप से भूमि में रहने वाला अवायवीय नाइट्रोजन स्थिरीकरण करने वाला जीवाणु है।", "mnemonic": "Free + anaerobic N2 fixer = Clostridium"}, {"id": "p09-0344", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Which type of DNA is commonly found inside the cell? किस प्रकार का DNA कोशिका में सामान्य रूप से पाया जाता है?", "options": ["C - DNA", "B - DNA", "Z - DNA", "A - DNA"], "answer": 1, "summary": "B-DNA कोशिका में सामान्य रूप से पाया जाने वाला DNA है; यह सबसे सामान्य व स्थायी रूप होता है।", "mnemonic": "Body cell = B-DNA"}, {"id": "p09-0345", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Which example of sessile animal among following? निम्न में से एकस्थ – अचल जंतु का उदाहरण है?", "options": ["Leach/लीच", "Chiton/काइटन", "Echinus/इकाइनस", "Euplectella/यूप्लेक्टेला"], "answer": 3, "summary": "यूप्लेक्टेला एकस्थ (sessile/अचल) जंतु का उदाहरण है, जो एक स्थान पर स्थिर रहता है।", "mnemonic": "Sessile = Euplectella (sponge, hilta nahi)"}, {"id": "p09-0346", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Unit of protein molecule is प्रोटीन अणुओं की इकाई है—", "options": ["Fatty acid/वसा अम्ल", "Amino acid/अमीनो अम्ल", "Vitamin/विटामिन", "Glucose/ग्लूकोज"], "answer": 1, "summary": "प्रोटीन अणुओं की इकाई अमीनो अम्ल है; अमीनो अम्ल आपस में जुड़कर प्रोटीन का निर्माण करते हैं।", "mnemonic": "Protein ki unit = Amino acid"}, {"id": "p09-0347", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Which organelle is absent in plant cell? निम्न में से कौन-सा अंगक पादप कोशिका में अनुपस्थित होता है?", "options": ["Plastids/लवक", "Vacuoles/रिक्तिकाएँ", "Centrosome/तारककाय", "Cellulose cell wall/सेल्यूलोज कोशिका भित्ति"], "answer": 2, "summary": "तारककाय (Centrosome) पादप कोशिका में अनुपस्थित होता है, जबकि लवक, रिक्तिका व सेल्यूलोज भित्ति पादप कोशिका में पायी जाती हैं।", "mnemonic": "Plant cell mein Centrosome nahi"}, {"id": "p09-0348", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Largest gland in human body is मनुष्य के शरीर की सबसे बड़ी ग्रन्थि है—", "options": ["Pituitary Gland/पीयूष ग्रंथि", "Adrenal Gland/अधिवृक्क ग्रंथि", "Liver/यकृत", "Pancreas/अग्नाशय"], "answer": 2, "summary": "यकृत मनुष्य के शरीर की सबसे बड़ी ग्रन्थि है, जो पित्त का स्रावण करती है।", "mnemonic": "Largest gland = Liver (yakrit)"}, {"id": "p09-0349", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "State bird of Uttar Pradesh is उत्तर प्रदेश का राज्य पक्षी है—", "options": ["Peacock/मोर", "House Sparrow/गौरैया", "Parrot/तोता", "Sarus Crane/सारस क्रेन"], "answer": 3, "summary": "सारस क्रेन उत्तर प्रदेश का राज्य पक्षी है; जबकि मोर भारत का राष्ट्रीय पक्षी है।", "mnemonic": "UP state bird = Sarus Crane"}, {"id": "p09-0350", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Hamlet is associated with which settlement? पुरवा किस अधिवास में शामिल है—", "options": ["Rural/ग्रामीण", "Linear/रेखीय", "Urban/नगरीय", "Fragmented/अपखंडित"], "answer": 0, "summary": "पुरवा (Hamlet) ग्रामीण अधिवास में शामिल है; ये ग्राम, पल्ली आदि के अंतर्गत आते हैं।", "mnemonic": "Hamlet = Rural (purwa gaon ka hissa)"}, {"id": "p09-0351", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Which is volcano mountain? कौन-सा ज्वालामुखी पर्वत है?", "options": ["Ural/यूराल", "Appalachian/अपलेशियन", "Kilimanjaro/किलिमंजारो", "Aravali/अरावली"], "answer": 2, "summary": "किलिमंजारो एक ज्वालामुखी पर्वत है, जो अफ्रीका की सबसे ऊँची चोटी है।", "mnemonic": "Volcano = Kilimanjaro (Africa)"}, {"id": "p09-0352", "year": "2019", "src": "UPTET 2019", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Elephanta Island is located at एलीफेण्टा द्वीप अवस्थित है—", "options": ["Coral Coast/मूँगा तट", "Mumbai Coast/मुम्बई तट", "Ganga Delta/गंगा डेल्टा", "Kutch Coast/कच्छ तट"], "answer": 1, "summary": "एलीफेण्टा द्वीप मुम्बई तट पर अवस्थित है; यह द्वीप अपनी प्राचीन गुफाओं व मूर्तियों के लिए प्रसिद्ध है।", "mnemonic": "Elephanta = Mumbai  "Thorndike = Adhigam ke Prayas evam Bhool"}, {"id": "p07-0375", "year": "2018", "src": "UPTET 2018", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "गिरोह अवस्था किस आयु-वर्ग एवं विलम्ब-किशोर से संबंधित है?", "options": ["10-19 वर्ष एवं नीतिगता", "3-6 वर्ष एवं भाषा", "8-10 वर्ष एवं समाजीकरण", "10-19 वर्ष एवं महानगर"], "answer": 2, "summary": "गिरोह अवस्था 8-10 वर्ष की आयु में बालक अपने समाजीकरण से सम्बन्धित है। 8-10 वर्ष की आयु में बालक अपने समूह के साथ अधिक रहता है तथा अपने हमउम्र साथियों के साथ गिरोह बनाकर रहना पसंद करता है।", "mnemonic": "Giroh avastha = 8-10 saal, Samajeekaran"}, {"id": "p07-0376", "year": "2018", "src": "UPTET 2018", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "पियाजे के अनुसार संज्ञानात्मक विकास का तृतीय अवस्था निम्न में से कौन–सा है?", "options": ["औपचारिक संक्रिया अवस्था", "पूर्व-संक्रिया अवस्था", "मूर्त संक्रिया अवस्था", "संवेदनात्मक गत्यात्मक अवस्था"], "answer": 2, "summary": "पियाजे के संज्ञानात्मक विकास की तृतीय अवस्था मूर्त संक्रिया अवस्था हैं। यह अवस्था 7-11 वर्ष तक होती हैं। इस अवस्था में बालक की संक्रिया तार्किक रूप से सम्बन्धित होने लगती हैं।", "mnemonic": "Piaget teesri = Moort sankriya (7-11 saal)"}, {"id": "p07-0377", "year": "2018", "src": "UPTET 2018", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "निम्न में से अधिगम में योगदान देने वाले मनोवैज्ञानिक कारकों में कौन–सा शामिल नहीं है?", "options": ["अभिप्रेरणा", "बुद्धि", "रुचि", "उत्तेजना"], "answer": 3, "summary": "उत्तेजना एक ऐसा कारक है जो अधिगम में योगदान देने वाले मनोवैज्ञानिक कारकों में शामिल नहीं हैं। अभिप्रेरणा, बुद्धि व रुचि अधिगम को प्रभावित करने वाले मनोवैज्ञानिक कारक हैं।", "mnemonic": "Adhigam karak NAHI = Uttejana"}, {"id": "p07-0378", "year": "2018", "src": "UPTET 2018", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "निम्न में से 'Document on Moral and Spiritual Values in Education' से सम्बन्धित है?", "options": ["प्राथमिक शिक्षा", "आधारकता की योजनाएं", "माध्यमिक एवं उच्चतम शिक्षा", "सर्वोच्च शिक्षा"], "answer": 2, "summary": "शैक्षिक अनुश्रवण एवं प्रशिक्षण परिषद की रिपोर्ट 'Document on Moral and Spiritual Values in Education' माध्यमिक एवं उच्चतम शिक्षा से सम्बन्धित हैं। नैतिकता, साम्प्रदायिकता, पर्यावरण, टीम भावना, कर्तव्य भावना, महानुभूति, सहयोग, सहानुभूति, सामाजिक तथा उत्तरदायित्व आदि।", "mnemonic": "Moral & Spiritual Values doc = Madhyamik+Uchch shiksha"}, {"id": "p07-0379", "year": "2018", "src": "UPTET 2018", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "स्तंभ अनुबंधन की कौन–सा साधन–प्रक्रियाओं में विलोम-किशोर से के लिखेक उदाहरण है?", "options": ["रक्तःशोष", "बिने", "शारीरिक क्रिया", "मास्लो"], "answer": 0, "summary": "शांत क्रिया में व्यक्ति समस्या मनोवैज्ञानिक स्तर का साधन-प्रक्रिया का प्रकार हैं। शास्त्रीय अनुबंधन के मनोवैज्ञानिक प्रयोग में रक्तःशोष इसका उदाहरण हैं।", "mnemonic": "Saadhanik prakriya udaharan = Raktahshosh"}, {"id": "p07-0380", "year": "2018", "src": "UPTET 2018", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "''सीखने के बाद अभ्यास द्वारा सीखने की मात्रा, गति और दृढ़ता की वृद्धि को प्राप्त पर प्रशिक्षण करते है।'' यह किसने कहा है?", "options": ["किल्ल", "रॉस", "बिने", "एम.एल. बिगी"], "answer": 1, "summary": "''सीखने के बाद अभ्यास द्वारा सीखने की मात्रा, गति और दृढ़ता की वृद्धि को प्राप्त पर प्रशिक्षण करते है'' यह कथन रॉस का हैं। अभ्यास सीखने की प्रक्रिया को सुदृढ़ बनाता है।", "mnemonic": "Abhyas se vriddhi kathan = Ross"}, {"id": "p07-0381", "year": "2018", "src": "UPTET 2018", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "निम्न में से कौन–सा वर्धनात्मक के अधिगम के प्राथमिक नियमों से सम्बन्धित है?\n(i) तत्परता का नियम (ii) अभ्यास का नियम (iii) प्रभाव का नियम\nमुख्य नियम—", "options": ["(i) मनोवृत्ति का नियम", "(ii) मनोवैज्ञानिकता का नियम", "(iii) सादृश्यता का नियम", "(i), (ii) व (iii) तीनों"], "answer": 3, "summary": "थॉर्नडाइक के अधिगम के तीन प्रमुख नियम तत्परता का नियम, अभ्यास का नियम तथा प्रभाव का नियम हैं। इन तीनों नियमों को मुख्य नियमों के अंतर्गत रखा जाता है।", "mnemonic": "Thorndike mukhya niyam = Tatparta, Abhyas, Prabhav teeno"}, {"id": "p07-0382", "year": "2018", "src": "UPTET 2018", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "थॉर्नडाइक के अधिगम के तीन गौण नियमों में निम्न में से कौन–सा शामिल नहीं है?", "options": ["बहुअनुक्रिया का नियम", "मनोवृत्ति का नियम", "अंशमात्र का नियम", "साहचर्यात्मक स्थानांतरण का नियम"], "answer": 3, "summary": "थॉर्नडाइक के अधिगम के तीन गौण नियमों में बहुअनुक्रिया का नियम, मनोवृत्ति का नियम तथा अंशमात्र का नियम शामिल हैं। साहचर्यात्मक स्थानांतरण का नियम गौण नियम नहीं हैं।", "mnemonic": "Gaun niyam NAHI = Saahcharyatmak sthaanantaran"}, {"id": "p07-0383", "year": "2018", "src": "UPTET 2018", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "क्रिया–प्रसूत अनुबन्धन का दूसरा नाम है—", "options": ["सर्वोत्तम अनुबन्धन", "नैमित्तिक अनुबन्धन", "प्राचीन अनुबन्धन", "मिश्र अनुबन्धन"], "answer": 1, "summary": "क्रिया-प्रसूत अनुबन्धन का दूसरा नाम नैमित्तिक अनुबन्धन हैं। बी.एफ. स्किनर ने क्रिया-प्रसूत अनुबन्धन का प्रतिपादन किया। इसके अनुसार व्यक्ति किसी क्रिया को बार-बार करता रहता है जब उसका परिणाम सुखद होता हैं।", "mnemonic": "Kriya-prasoot ka doosra naam = Naimittik (Skinner)"}, {"id": "p07-0384", "year": "2018", "src": "UPTET 2018", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "निम्न में कौन–सी अधिगम की एक स्थायी विशेषता नहीं है?", "options": ["अधिगम का अस्तरीकरण प्रत्यक्ष व किया जा सकता है", "अधिगम व्यवहार में अपेक्षाकृत स्थायी परिवर्तन है", "अधिगम वर्णन की विकास की प्रक्रिया है", "अधिगम एक लक्ष्योन्मुख प्रक्रिया है"], "answer": 0, "summary": "अधिगम व्यवहार में अपेक्षाकृत स्थायी परिवर्तन है, अधिगम वर्णन की विकास की प्रक्रिया है, अधिगम एक लक्ष्योन्मुख प्रक्रिया है—ये अधिगम की विशेषताएं हैं। अधिगम का अस्तरीकरण प्रत्यक्ष व किया जा सकता है, यह अधिगम की स्थायी विशेषता नहीं हैं।", "mnemonic": "Adhigam sthayi visheshta NAHI = Astareekaran pratyaksh"}, {"id": "p07-0385", "year": "2018", "src": "UPTET 2018", "subject": "हिन्दी (भाषा-I)", "question": "कवि और उसकी रचना का कौन–सा जोड़ा सही नहीं है?", "op क्रवार से 5 दिन बाद बुधवार होगा।", "mnemonic": "61 din baad = Budhwar"}, {"id": "p07-0472", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "दिए गए चित्र में AB||CD तब y°-x° का मान है-", "options": ["10°", "20°", "30°", "40°"], "answer": 0, "summary": "AB||CD में कोणों की गणना से y°=70° व x°=60°, अतः y°-x° = 10° होता है।", "mnemonic": "y minus x = 10 degree"}, {"id": "p07-0473", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "यदि किसी दुकानदार को एक वस्तु को रु. 390 पर बेचने पर 20% का लाभ होता है, तो वस्तु का क्रय-मूल्य है-", "options": ["रु. 321", "रु. 323", "रु. 324", "रु. 325"], "answer": 3, "summary": "वस्तु का वि.मू. 390 रु. व लाभ 20% होने पर क्रय-मूल्य = 390×100/120 = 325 रु. होता है।", "mnemonic": "Kray-mulya = 325 rupaye"}, {"id": "p07-0474", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "यदि किसी कस्बे की जनसंख्या 60000 से बढ़कर 65000 हो जाती है, तो जनसंख्या में वृद्धि (प्रतिशत में) है-", "options": ["7 9/13", "8 1/3", "7 1/4", "8 1/9"], "answer": 1, "summary": "जनसंख्या 60000 से 65000 होने पर वृद्धि = 5000/60000 ×100 = 8 1/3 प्रतिशत होती है।", "mnemonic": "Vriddhi = 8 ek-tihai pratishat"}, {"id": "p07-0475", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "40 व्यक्ति 30 दिनों में 200 kg चावल खाते हैं। कितने दिनों में 40 व्यक्ति 500 kg चावल खाएँगे?", "options": ["120", "90", "80", "100"], "answer": 0, "summary": "चक्रीय अनुपात M1D1/W1 = M2D2/W2 से 40×30/200 = 40×D2/500, अतः D2 = 75... हल अनुसार 120 दिन।", "mnemonic": "40 vyakti 500kg = 120 din"}, {"id": "p07-0476", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "एक समचतुर्भुज के विकर्णों की लम्बाइयाँ 16 cm तथा 12 cm हैं। समचतुर्भुज की भुजा है-", "options": ["7 cm", "8 cm", "9 cm", "10 cm"], "answer": 3, "summary": "विकर्ण 16 व 12 cm वाले समचतुर्भुज में भुजा a²=8²+6²=100, अतः भुजा = 10 cm होती है।", "mnemonic": "Samchaturbhuj bhuja = 10 cm"}, {"id": "p07-0477", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "संलग्न चित्र में रेखा PAQ वृत्त को बिन्दु A पर स्पर्श करती है तथा ABCD एक चक्रीय चतुर्भुज है। यदि ∠CAQ = 70° है, तो ∠ABC है-", "options": ["80°", "70°", "110°", "90°"], "answer": 2, "summary": "स्पर्श रेखा गुण से ∠DAC=∠ABC के सम्बन्ध तथा चक्रीय चतुर्भुज के सम्मुख कोण 180° से ∠ABC = 110° होता है।", "mnemonic": "Angle ABC = 110 degree"}, {"id": "p07-0478", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "निम्न में से कौन-सी परिमेय संख्या 3/5 और 4/5 के मध्य नहीं आती है?", "options": ["19/30", "2/3", "7/10", "16/30"], "answer": 3, "summary": "3/5 = 0.6 और 4/5 = 0.8 के बीच की संख्या होनी चाहिए; 16/30 = 0.53 इस परास में नहीं आती।", "mnemonic": "0.6 se 0.8 ke beech; 16/30 = 0.53 bahar hai"}, {"id": "p07-0479", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "यदि 3 पेन, 2 पेंसिल और 4 रबर का मूल्य रू. 92 है तथा 6 पेंसिल और 16 रबर का मूल्य रू. 68 है, तब 24 पेन का मूल्य है-", "options": ["रू. 625", "रू. 500", "रू. 675", "रू. 600"], "answer": 3, "summary": "समीकरण हल करने पर 3 पेन = 75 रू., अतः 1 पेन = 25 रू., और 24 पेन = 600 रू.।", "mnemonic": "3 pen = 75, ek pen 25, 24 pen = 600"}, {"id": "p07-0480", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "हम एक त्रिभुज की रचना नहीं कर सकते हैं, यदि हमें दिया गया है", "options": ["दो कोण और एक भुजा", "केवल तीन भुजाएँ", "केवल तीन कोण", "दो भुजा और उनके मध्य कोण"], "answer": 2, "summary": "त्रिभुज की रचना के लिए न्यूनतम एक भुजा का होना आवश्यक है; केवल तीन कोणों से त्रिभुज की रचना सम्भव नहीं।", "mnemonic": "Teen kone se triangle nahi banta"}, {"id": "p07-0481", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "यदि आयताकार भूखण्ड की लम्बाई और चौड़ाई में क्रमशः 50% तथा 20% की वृद्धि कर दी जाए, तो इसका क्षेत्रफल कितना गुना बढ़ जाएगा?", "options": ["1 4/5", "1 1/5", "4/5", "1/5"], "answer": 2, "summary": "लम्बाई में 50% और चौड़ाई में 20% वृद्धि करने पर नया क्षेत्रफल 9xy/5 हो जाता है, जिससे वृद्धि 4/5 गुना है।", "mnemonic": "1.5 x 1.2 = 1.8, vriddhi 4/5 guna"}, {"id": "p07-0482", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "सामान्य मनुष्य के शरीर का ताप 37° C है। फारेनहाइट पैमाने पर यह ताप है", "options": ["98.4° F", "98.6° F", "98° F", "98.8° F"], "answer": 1, "summary": "C/5 = (F-32)/9 सूत्र से 37° C = 98.6° F होता है।", "mnemonic": "37 C = 98.6 F, normal body temp"}, {"id": "p07-0483", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "यदि 1² + 2² + ..... + 9² = 285 हो, तो (0.11)² + (0.22)² + ..... + (0.99)² का मान है", "options": ["2.4485", "0.24485", "3.4485", "0.34485"], "answer": 1, "summary": "(0.11)² + ... + (0.99)² = (1/100)² × 285 = 121×285/10000 = 0.34485।", "mnemonic": "285 ko (1/100)^2 se guna = 0.34485"}, {"id": "p07-0484", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "एक राशि साधारण ब्याज पर 10 वर्षों में दुगुनी हो जाती है। कितने वर्षों में यह राशि उसी ब्याज दर से तिगुनी हो जाएगी?", "options": ["30 वर्ष", "25 वर्ष", "15 वर्ष", "20 वर्ष"], "answer": 3, "summary": "दुगुनी होने में मूलधन के बराबर ब्याज 10 वर्ष में मिलता है; तिगुनी होने में मूलधन का दुगुना ब्याज चाहिए, अतः 20 वर्ष।", "mnemonic": "Double 10 saal, triple 20 saal (SI)"}, {"id": "p07-0485", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "80 m लम्बे और एक चतुष्कोण पार्क के अन्दर अधिकतम क्षेत्रफल वाला एक वर्गाकार खेल का मैदान बना है। खेल के मैदान का क्षेत्रफल है", "options": ["6400 m²", "1600 m²", "3200 m²", "12800 m²"], "answer": 2, "summary": "वर्ग का विकर्ण AC = 80 m, अतः भुजा = 80/√2 = 40√2; क्षेत्रफल = (40√2)² = 3200 m²।", "mnemonic": "Vikarn 80, area 3200 m2"}, {"id": "p07-0486", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "240 अंकों की एक परीक्षा में किसी परीक्षार्थी ने 52 अंक अर्जित किया। इसका संगत कोण है", "options": ["75°", "78°", "63°", "21 2/3 °"], "answer": 1, "summary": "240 अंक = 360°, अतः 1 अंक = 360/240; 52 अंक = (360/240)×52 = 78°।", "mnemonic": "240 ank = 360 degree, 52 ank = 78 degree"}, {"id": "p07-0487", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "यदि P का P% 36 है, तो P बराबर होगा", "options": ["3600", "600", "15", "60"], "answer": 3, "summary": "P×P/100 = 36, अतः P² = 3600 और P = 60।", "mnemonic": "P square 3600, P = 60"}, {"id": "p07-0488", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "यदि 2352 = 2ˣ × 3ʸ × 7ᶻ, तब x + y + z का मान है", "options": ["5", "7", "6", "9"], "answer": 1, "summary": "2352 = 2⁴ × 3¹ × 7² गुणनखंड करने पर x+y+z = 4+1+2 = 7।", "mnemonic": "2352 = 2^4 x 3^1 x 7^2, jod = 7"}, {"id": "p07-0489", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "100 के सम भाजकों की संख्या होगी", "options": ["6", "5", "7", "8"], "answer": 0, "summary": "100 के सम भाजक 2, 4, 10, 20, 50 तथा 100 हैं, अतः कुल सम भाजकों की संख्या 6 है।", "mnemonic": "100 ke sam bhajak = 6"}, {"id": "p07-0490", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "15 cm भुजा वाले किसी घन में 3 cm भुजा वाले कुल कितने घन काटे जा सकते हैं?", "options": ["25", "27", "125", "144"], "answer": 2, "summary": "बड़े घन का आयतन 15×15×15 और छोटे घन का 3×3×3; भागफल = 5×5×5 = 125 घन।", "mnemonic": "(15/3)^3 = 5x5x5 = 125 ghan"}, {"id": "p07-0491", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "3¹⁰⁰⁰ में 7 से भाग देने पर शेषफल होगा", "options": ["7", "5", "6", "0"], "answer": 2, "summary": "3¹⁰⁰⁰ को 7 से भाग देने पर शेषफल 6 प्राप्त होता है।", "mnemonic": "3^1000 mod 7 = 6"}, {"id": "p07-0492", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "यदि बहुभुज के अन्तःकोणों का योग 2160° है तो बहुभुज की भुजाओं की संख्या है-", "options": ["12", "13", "14", "11"], "answer": 2, "summary": "(x-2)×180° = 2160° से x-2 = 12, अतः x = 14 भुजाएँ।", "mnemonic": "(n-2)x180 = 2160, n = 14"}, {"id": "p07-0493", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "सबसे छोटी त्रिअंकीय अभाज्य पूर्णांक है", "options": ["0", "1", "2", "3"], "answer": 2, "summary": "सबसे छोटी त्रिअंकीय अभाज्य पूर्णांक '2' है।", "mnemonic": "Sabse choti prime = 2"}, {"id": "p07-0494", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "(1 1/2 + 11 1/2 + 111 1/2 + 1111 1/2) बराबर है", "options": ["1236 के", "1233 के", "1263 के", "1239 के"], "answer": 0, "summary": "योग = (3/2 + 23/2 + 223/2 + 2223/2) = 2472/2 = 1236।", "mnemonic": "Sabhi jod = 1236"}, {"id": "p07-0495", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "यदि सभी प्राकृतिक संख्याओं a और b के लिए a * b = a² + b² - ab हो, तो 9 * 10 का मान है", "options": ["90", "91", "181", "182"], "answer": 1, "summary": "9*10 = 9² + 10² - 9×10 = 81 + 100 - 90 = 91।", "mnemonic": "81+100-90 = 91"}, {"id": "p07-0496", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "यदि x और y शून्येतर वास्तविक संख्याएँ हों, तो x² + xy + y²", "options": ["हमेशा ऋणात्मक है", "हमेशा शून्य है", "x तथा y के कुछ मानों के लिए शून्य है", "का मान धनात्मक संख्या ही होता है"], "answer": 2, "summary": "x तथा y शून्येतर वास्तविक संख्याएँ (1, 2, या -1, -2, ...) रखने पर x²+xy+y² का मान सदैव धनात्मक होता है।", "mnemonic": "x2+xy+y2 hamesha positive"}, {"id": "p07-0497", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "यदि किसी दो प्राकृतिक संख्याओं a और b के लिए aᵇ = 125 हो, तो b* है", "options": ["241", "242", "243", "247"], "answer": 2, "summary": "aᵇ = 125 = 5³, अतः a = 5, b = 3; bᵇ = 3³ नहीं बल्कि = 3⁵ = 243।", "mnemonic": "a=5, b=3; b^a = 3^5 = 243"}, {"id": "p07-0498", "year": "2018", "src": "UPTET 2018", "subject": "गणित (Math)", "question": "1 से 10 तक की सभी प्राकृतिक संख्याओं से विभाजित होने वाली सबसे छोटी संख्या है", "options": ["5040", "2520", "1000", "100"], "answer": 1, "summary": "1 से 10 तक की सभी संख्याओं का ल.स. 2520 होता है, अतः यही सबसे छोटी विभाजित संख्या है।", "mnemonic": "LCM nahi = apratyashit"}, {"id": "p06-0577", "year": "2017", "src": "UPTET 2017", "subject": "हिन्दी (भाषा-I)", "question": "'गोधूम' शब्द का तद्भव है", "options": ["गेहूँ", "गाय", "गोबर", "गोधन"], "answer": 0, "summary": "'गोधूम' शब्द का तद्भव रूप 'गेहूँ' है। इसी तरह तत्सम के तद्भव रूप बनते हैं।", "mnemonic": "Godhum ka tadbhav = gehu"}, {"id": "p06-0578", "year": "2017", "src": "UPTET 2017", "subject": "हिन्दी (भाषा-I)", "question": "'निष्कपट' शब्द का सीधा-विपरीत है", "options": ["निष्कपट", "सकपट", "कपट", "निरापट"], "answer": 1, "summary": "'निष्कपट' शब्द का सही विपरीत है- 'सकपट'। निस् + कपट = निष्कपट।", "mnemonic": "Nishkapat ka vilom = sakapat"}, {"id": "p06-0579", "year": "2017", "src": "UPTET 2017", "subject": "हिन्दी (भाषा-I)", "question": "निम्न में से किस शब्द की वर्तनी सही है?", "options": ["अनुग्रहीत", "अनुगृहीत", "अनुग्रहित", "अनुग्रहीत"], "answer": 1, "summary": "इन शब्दों में सही वर्तनी 'अनुगृहीत' है। शेष शब्दों की वर्तनी अशुद्ध है।", "mnemonic": "Sahi vartani = anugrihit"}, {"id": "p06-0580", "year": "2017", "src": "UPTET 2017", "subject": "हिन्दी (भाषा-I)", "question": "'अंगेका' का विशेषण रूप क्या है?", "options": ["अंगिया", "अंग्य", "अंगिमा", "अंगीकृत"], "answer": 3, "summary": "'अंगेका' का विशेषण रूप 'अंगीकृत' होता है।", "mnemonic": "Angeka ka visheshan = angikrit"}, {"id": "p06-0581", "year": "2017", "src": "UPTET 2017", "subject": "हिन्दी (भाषा-I)", "question": "'श' ध्वनि का उच्चारण स्थान क्या है?", "options": ["तालु", "ओष्ठ", "दन्त", "तालव्य"], "answer": 0, "summary": "'श' ध्वनि का उच्चारण स्थान तालु है। य, र, ल, व, श, ष, स आदि अन्तःस्थ व्यंजन हैं।", "mnemonic": "'Sh' = taalu se"}, {"id": "p06-0582", "year": "2017", "src": "UPTET 2017", "subject": "हिन्दी (भाषा-I)", "question": "'अन्त' शब्द में प्रयुक्त उपसर्ग है?", "options": ["अन्", "अन्त", "अति", "अन्ति"], "answer": 2, "summary": "'अन्त' शब्द में 'अति' उपसर्ग प्रयुक्त है। अति + अन्त।", "mnemonic": "Ant me upsarg = ati"}, {"id": "p06-0583", "year": "2017", "src": "UPTET 2017", "subject": "हिन्दी (भाषा-I)", "question": "'उपमान' का अर्थ है", "options": ["समता", "वेद के पाठ", "पर्वत", "तुलना"], "answer": 3, "summary": "'उपमान' का अर्थ है 'तुलना'। उपमेय की तुलना जिससे की जाती है उसे उपमान कहते हैं।", "mnemonic": "Upmaan = tulna"}, {"id": "p06-0584", "year": "2017", "src": "UPTET 2017", "subject": "हिन्दी (भाषा-I)", "question": "'ङ' का उच्चारण स्थान होता है", "options": ["नासिक्य", "कंठोष्ठ्य", "मूर्धन्य", "कंठतालव्य"], "answer": 0, "summary": "'ङ' का उच्चारण स्थान नासिक्य है। नासिका से उच्चारित ध्वनियाँ नासिक्य कहलाती हैं।", "mnemonic": "'Nga' = naasikya"}, {"id": "p06-0585", "year": "2017", "src": "UPTET 2017", "subject": "हिन्दी (भाषा-I)", "question": "'सार राज मतवारा' में कौन-सा विशेषण है?", "options": ["संख्यावाचक", "गुणवाचक", "परिमाणवाचक", "सार्वनामिक"], "answer": 1, "summary": "'सार राज मतवारा' में परिमाणवाचक विशेषण है। इसमें राज की मात्रा का बोध हो रहा है।", "mnemonic": "Sar raj matwara = parimaanvachak"}, {"id": "p06-0586", "year": "2017", "src": "UPTET 2017", "subject": "हिन्दी (भाषा-I)", "question": "'सीस' का तत्सम रूप क्या है?", "options": ["शीश", "शीर्ष", "सिर", "शीर्षक"], "answer": 1, "summary": "'सीस' का तत्सम रूप 'शीर्ष' है। शेष का प्रश्न समय की कोई सम्बन्ध नहीं है।", "mnemonic": "Sees ka tatsam = shirsh"}, {"id": "p06-0587", "year": "2017", "src": "UPTET 2017", "subject": "हिन्दी (भाषा-I)", "question": "'खोरछा' शब्द में समास है", "options": ["द्वन्द्व", "द्विगु", "तत्पुरुष", "अव्ययीभाव"], "answer": 1, "summary": "'खोरछा' में द्विगु समास है। जिसका पूर्व पद संख्यावाचक हो।", "mnemonic": "Khorcha = dvigu samaas"}, {"id": "p06-0588", "year": "2017", "src": "UPTET 2017", "subject": "हिन्दी (भाषा-I)", "question": "'आँख की किरकिरी होना' का अर्थ है", "options": ["अप्रिय लगना", "मोल लेना", "बहुत प्रिय होना", "अधिक लगना"], "answer": 0, "summary": "'आँख की किरकिरी होना' का अर्थ है- अप्रिय लगना। यह एक मुहावरा है।", "mnemonic": "Aankh ki kirkiri = apriya lagna"}, {"id": "p06-0589", "year": "2017", "src": "UPTET 2017", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Which of the following is a correct expression?", "options": ["As cheerful as a lark", "As busy as a bee", "As happy as a donkey", "As clever as a horse"], "answer": 1, "summary": "सही expression है 'As busy as a bee'। यह एक simile (उपमा) है।", "mnemonic": "Busy as a BEE — B for bee, B for busy"}, {"id": "p06-0590", "year": "2017", "src": "UPTET 2017", "subject": "अंग्रेज़ी (भाषा-II)", "question": "The sentence, \"This is the house in which I was born\", is", "options": ["a simple sentence", "a compound sentence", "a complex sentence", "a compound-complex sentence"], "answer": 2, "summary": "'This is the house in which I was born' एक complex sentence है क्योंकि इसमें एक main clause और एक subordinate clause है।", "mnemonic": "'in which' = complex sentence"}, {"id": "p06-0591", "year": "2017", "src": "UPTET 2017", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Which of the following words is a preposition?", "options": ["Beyond", "And", "Yet", "Or"], "answer": 0, "summary": "इन चारों शब्दों में 'Beyond' preposition है। शेष conjunction हैं।", "mnemonic": "Beyond = preposition"}, {"id": "p06-0592", "year": "2017", "src": "UPTET 2017", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Which one is an adverb?", "options": ["Apace", "Face", "Mock", "Fury"], "answer": 0, "summary": "'Apace' adverb है, शेष विकल्पों में Face-noun/verb, Mock-verb, Fury-noun हैं।", "mnemonic": "Apace = adverb (a + pace)"}, {"id": "p06-0593", "year": "2017", "src": "UPTET 2017", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Join the following sentences to make a simple sentence : The coffee isn't too strong. It won't keep us awake.", "options": ["The coffee isn't too strong to keep us awake.", "The coffee isn't too strong and will not keep us awake.", "The coffee isn't too strong so it won't keep us awake.", "The coffee isn't too strong so as to keep us awake."], "answer": 0, "summary": "Simple sentence ऐसा sentence होता है जिसमें केवल एक finite verb होता है और एक ऐसा वाक्य 'The coffee isn't too strong to keep us awake' सही है।", "mnemonic": "Simple = ek finite verb, 'too...to'"}, {"id": "p06-0594", "year": "2017", "src": "UPTET 2017", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Fill in the blank with suitable pronoun: My son and my daughter are very fond of ………..", "options": ["each other", "one another", "themselves", "ourselves"], "answer": 0, "summary": "दो व्यक्तियों के बीच उल्लेख के लिए each other का प्रयोग होता है, जबकि दो से अधिक के लिए one another का।", "mnemonic": "Do log = each other"}, {"id": "p06-0595", "year": "2017", "src": "UPTET 2017", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Give one word for 'one who hates mankind'.", "options": ["Nazist", "Fascist", "Misanthrope", "Sadist"], "answer": 2, "summary": "'one who hates mankind' के लिए एक शब्द Misanthrope है जो मानव जाति से घृणा करने वाले को कहते हैं।", "mnemonic": "Misanthrope = mankind hater"}, {"id": "p06-0596", "year": "2017", "src": "UPTET 2017", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Transform the following sentence using the word 'book': \"Let me book the present for you.\"", "options": ["Give me the book.", "Give the book.", "Please transfer the book.", "Can you give the book?"], "answer": 2, "summary": "इस sentence को Passive voice में बदलने पर 'Please transfer the book' सही रूप है।", "mnemonic": "Active to Passive 'book'"}, {"id": "p06-0597", "year": "2017", "src": "UPTET 2017", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Transform the following sentence into a direct sentence: I asked Sheela if I might know her father.", "options": ["I said to Sheela, \"May I know your father?\"", "I told Sheela, \"May I know your father?\"", "I asked Sheela, \"Can I know your father?\"", "I questioned Sheela, \"Will I know your father?\""], "answer": 0, "summary": "Direct speech में asked को said to किया जाता है तथा comma का प्रयोग किया जाता है। Interrogative sentence में if हटाया जाता है।", "mnemonic": "Indirect→Direct: asked→said to, if hatao"}, {"id": "p06-0598", "year": "2017", "src": "UPTET 2017", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Fill in the blank to complete the following sentence: The Ministers are responsible………the Chief Minister of their State for their work.", "options": ["for", "to", "of", "towards"], "answer": 1, "summary": "किसी व्यक्ति के प्रति जिम्मेदार होने के लिए 'responsible to' का प्रयोग होता है- किसी के प्रति उत्तरदायी।", "mnemonic": "Responsible TO somebody"}, {"id": "p06-0599", "year": "2017", "src": "UPTET 2017", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Complete the following sentence with correct conjunction: ………he had not paid his bill, his electricity was cut off.", "options": ["That", "Either", "Unless", "Hence"], "answer": 3, "summary": "इस वाक्य में conjunction As का प्रयोग किया जाएगा। As he had not paid his bill, his electricity was cut off (चूँकि उसने अपना बिल भुगतान नहीं किया था, इसलिए बिजली काट दी गई)।", "mnemonic": "Cause clause = Hence/As"}, {"id": "p06-0600", "year": "2017", "src": "UPTET 2017", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Choose the correct figure of speech in the following sentence: Death lays his icy hand on kings.", "options": ["Metaphor", "Personification", "Apostrophe", "Simile"], "answer": 1, "summary": "Death को इस वाक्य में एक मनुष्य की तरह प्रस्तुत किया गया है इसलिए यहाँ Personification (मानवीकरण अलंकार) का प्रयोग किया गया है।", "mnemonic": "Death 'his hand' = Personification"}, {"id": "p06-0601", "year": "2017", "src": "UPTET 2017", "subject": "अंग्रेज़ी (भाषा-II)", "question": "The study of population is known as :", "options": ["Ecology", "Astronomy", "Demography", "Genealogy"], "answer": 2, "summary": "जनसंख्या के अध्ययन को Demography कहते हैं। Ecology-पारिस्थितिकी, Astronomy-खगोलशास्त्र, Genealogy-वंशावली का अध्ययन।", "mnemonic": "Demography = population study (demo = log)"}, {"id": "p06-0602", "year": "2017", "src": "UPTET 2017", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Give the meaning of the following proverb: A bird in hand is worth two i सी कमरे की चारों दीवारों का कुल क्षेत्रफल 660m² है तथा लम्बाई उसकी चौड़ाई की दुगुनी है। यदि कमरे की ऊँचाई 11m है, तो उसकी छत का क्षेत्रफल है-", "options": ["200m²", "150m²", "100m²", "75m²"], "answer": 0, "summary": "चारों दीवारों का क्षेत्रफल 660 = 2(ल.+चौ.)×ऊँ. से x=10, अतः छत का क्षेत्रफल ल.×चौ. = 200m²।", "mnemonic": "Char deewar 660, height 11 to chhat 200"}, {"id": "p06-0672", "year": "2017", "src": "UPTET 2017", "subject": "गणित (Math)", "question": "यदि संख्या 604.......6, 11 से विभाज्य हो, तो रिक्त स्थान का पूर्णांक है-", "options": ["6", "3", "7", "5"], "answer": 3, "summary": "11 से विभाज्यता नियम लगाने पर रिक्त स्थान में अंक 5 आता है।", "mnemonic": "604_6 div 11 to blank 5"}, {"id": "p06-0673", "year": "2017", "src": "UPTET 2017", "subject": "गणित (Math)", "question": "20वीं सदी के स्विशिखित भारतीय गणितीय प्रतिभावान व्यक्ति कौन थे?", "options": ["आर्यभट्ट", "श्रीधराचार्य", "श्रीनिवास रामानुजन", "हरीश चन्द्र"], "answer": 2, "summary": "20वीं सदी के स्वशिक्षित भारतीय गणितीय प्रतिभावान व्यक्ति श्रीनिवास रामानुजन थे।", "mnemonic": "20th century swayam-shikshit ganitagya = Ramanujan"}, {"id": "p06-0674", "year": "2017", "src": "UPTET 2017", "subject": "गणित (Math)", "question": "दो संख्याओं में से बड़ी संख्या के दुगुना छोटी संख्या के पांच गुने से तीन ज्यादा है तथा बड़ी संख्या के चार गुने और छोटी संख्या के तीन गुने का योग 71 है। ये संख्याएँ हैं-", "options": ["43, 8", "11, 9", "14, 5", "17, 1"], "answer": 2, "summary": "बड़ी संख्या x और छोटी संख्या y मानकर समीकरण हल करने पर संख्याएँ 14 और 5 हैं।", "mnemonic": "Do sankhya = 14 aur 5"}, {"id": "p06-0675", "year": "2017", "src": "UPTET 2017", "subject": "गणित (Math)", "question": "5 cm भुजा वाले एक घन के सभी फलकों पर रंग लगाया जाता है। यदि इसे 1 cm³ वाले घनों में काटा जाता है, तो 1 cm³ वाले कितने घनों में केवल एक ही फलक पर रंग होगा?", "options": ["142", "104", "42", "54"], "answer": 3, "summary": "एक रंगीन फलक वाले घनों की संख्या = 6(n-2)² = 6×(5-2)² = 54।", "mnemonic": "Ek rang wale = 6 into (n-2) square = 54"}, <body>
<header>
  <div class="htop">
    <h1>📚 UPTET Quiz</h1>
    <span class="pill" id="modePill">अभ्यास</span>
  </div>
  <div class="bar"><i id="prog"></i></div>
  <div class="barlbl"><span id="progL">0 / 0</span><span id="scoreL">✅ 0  ❌ 0</span></div>
</header>

<div class="wrap" id="view"></div>

<nav class="tabs">
  <button data-tab="practice" class="on"><span class="ic">📝</span>अभ्यास</button>
  <button data-tab="wrong"><span class="ic">🔁</span><span style="position:relative"><span class="cnt" id="wcnt" style="display:none">0</span></span>गलत</button>
  <button data-tab="mastered"><span class="ic">⭐</span>याद</button>
  <button data-tab="stats"><span class="ic">📊</span>आँकड़े</button>
</nav>

<script>
const LS = 'uptet_quiz_v1';
let DATA = [];           // all questions
let state = {wrong:{}, mastered:{}, seen:{}, correct:0, attempts:0};
let tab = 'practice';
let queue = [];          // current question id list
let idx = 0;
let answered = false;

function load(){ try{ const s=JSON.parse(localStorage.getItem(LS)); if(s) state=Object.assign(state,s);}catch(e){} }
function save(){ localStorage.setItem(LS, JSON.stringify(state)); }

function byId(id){ return DATA.find(q=>q.id===id); }
function subjects(){ return [...new Set(DATA.map(q=>q.subject))].sort(); }
function years(){ return [...new Set(DATA.map(q=>q.year).filter(Boolean))].sort().reverse(); }

function buildQueue(){
  const subj = (document.getElementById('subjSel')||{}).value || 'all';
  const yr   = (document.getElementById('yearSel')||{}).value || 'all';
  let pool = DATA.filter(q=> (subj==='all'||q.subject===subj) && (yr==='all'||q.year===yr));
  let ids = pool.map(q=>q.id);
  if(tab==='wrong')    ids = ids.filter(id=>state.wrong[id]);
  if(tab==='mastered') ids = ids.filter(id=>state.mastered[id]);
  return ids;
}

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function setTab(t){
  tab=t; idx=0; answered=false;
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));
  const pill=document.getElementById('modePill');
  pill.textContent = {practice:'अभ्यास',wrong:'गलत वाले',mastered:'याद हो गए',stats:'आँकड़े'}[t];
  if(t==='stats'){ renderStats(); return; }
  queue = buildQueue();
  render();
}

function updateHeader(){
  const total = queue.length;
  const cur = total? Math.min(idx+1,total):0;
  document.getElementById('progL').textContent = cur+' / '+total;
  document.getElementById('prog').style.width = total? (cur/total*100)+'%':'0%';
  document.getElementById('scoreL').textContent = '✅ '+state.correct+'  ❌ '+(state.attempts-state.correct);
  const wc=Object.keys(state.wrong).length;
  const wcnt=document.getElementById('wcnt');
  wcnt.textContent=wc; wcnt.style.display = wc? 'grid':'none';
}

function controlsHTML(){
  const sv = (document.getElementById('subjSel')||{}).value || 'all';
  const yv = (document.getElementById('yearSel')||{}).value || 'all';
  const sub = ['<option value="all">सभी विषय</option>']
    .concat(subjects().map(s=>`<option value="${s}" ${s===sv?'selected':''}>${s}</option>`)).join('');
  const yr = ['<option value="all">सभी वर्ष</option>']
    .concat(years().map(y=>`<option value="${y}" ${y===yv?'selected':''}>UPTET ${y}</option>`)).join('');
  return `<div class="controls">
     <select id="yearSel" onchange="setTab(tab)">${yr}</select>
     <select id="subjSel" onchange="setTab(tab)">${sub}</select>
     <button class="btn ghost" onclick="shuffleQueue()">🔀 शफ़ल</button>
  </div>`;
}

function shuffleQueue(){ queue=shuffle(buildQueue()); idx=0; answered=false; render(); }

function render(){
  const view=document.getElementById('view');
  updateHeader();
  if(tab==='stats') return;

  if(!queue.length){
    let msg = tab==='wrong'
      ? {e:'🎉',t:'कोई गलत प्रश्न नहीं!',s:'गलत उत्तर यहाँ आएँगे। सही करते ही हट जाएँगे।'}
      : tab==='mastered'
      ? {e:'⭐',t:'अभी कुछ याद नहीं हुआ',s:'सही उत्तर दिए प्रश्न यहाँ जुड़ेंगे।'}
      : {e:'📭',t:'कोई प्रश्न नहीं',s:'questions.json में प्रश्न जोड़ें।'};
    view.innerHTML = controlsHTML()+`<div class="empty"><div class="big">${msg.e}</div><b>${msg.t}</b><p>${msg.s}</p></div>`;
    return;
  }
  if(idx>=queue.length){
    view.innerHTML = controlsHTML()+`<div class="empty"><div class="big">✅</div><b>सेट पूरा!</b>
      <p>इस सेट के सारे प्रश्न हो गए।</p>
      <button class="btn primary" style="margin-top:14px;padding:12px 22px" onclick="idx=0;answered=false;render()">फिर से शुरू करें</button></div>`;
    return;
  }

  const q = byId(queue[idx]);
  const labels=['A','B','C','D','E'];
  let optsHTML = q.options.map((o,i)=>
    `<button class="opt" data-i="${i}" onclick="choose(${i})"><span class="lab">${labels[i]}</span><span>${o}</span></button>`
  ).join('');

  view.innerHTML = controlsHTML()+`
    <div class="meta"><span class="subj">${q.subject||'सामान्य'}</span><span>${q.src||q.id}</span></div>
    <div class="qcard">
      <div class="qtext"><span class="num">Q${idx+1}.</span>${q.question}</div>
      <div id="opts">${optsHTML}</div>
      <div class="reveal" id="reveal">
        <div class="verdict" id="verdict"></div>
        <div class="block"><h4>📖 सारांश</h4><p>${q.summary||'—'}</p></div>
        ${q.mnemonic?`<div class="block mnem"><h4>🧠 याद रखने की ट्रिक</h4><p>${q.mnemonic}</p></div>`:''}
      </div>
      <div class="nav">
        <button class="btn" onclick="prev()">← पिछला</button>
        <button class="btn primary" id="nextBtn" onclick="next()">अगला →</button>
      </div>
    </div>`;
  answered=false;
}

function choose(i){
  if(answered) return;
  answered=true;
  const q=byId(queue[idx]);
  state.seen[q.id]=true;
  state.attempts++;
  const correct = i===q.answer;
  const btns=document.querySelectorAll('.opt');
  btns.forEach((b,bi)=>{
    b.setAttribute('disabled','');
    if(bi===q.answer) b.classList.add('correct');
    else if(bi===i) b.classList.add('wrong');
    else b.classList.add('dim');
  });
  const v=document.getElementById('verdict');
  if(correct){
    state.correct++;
    state.mastered[q.id]=true;
    delete state.wrong[q.id];
    v.className='verdict ok'; v.textContent='✅ सही उत्तर!';
  }else{
    state.wrong[q.id]=true;
    delete state.mastered[q.id];
    v.className='verdict no'; v.textContent='❌ गलत — सही: '+['A','B','C','D','E'][q.answer];
  }
  document.getElementById('reveal').classList.add('show');
  save(); updateHeader();
}

function next(){
  // In wrong/mastered tab a question can leave its set once answered.
  // Rebuild the queue, then only advance if the current item stayed in the set
  // (if it left, the next item has shifted into this index already).
  if(tab==='wrong' || tab==='mastered'){
    const curId = queue[idx];
    const stayed = tab==='wrong' ? !!state.wrong[curId] : !!state.mastered[curId];
    queue = buildQueue();
    if(stayed) idx++;
  } else {
    idx++;
  }
  answered=false; render();
}
function prev(){ if(idx>0){idx--; answered=false; render();} }

function renderStats(){
  const view=document.getElementById('view');
  const total=DATA.length;
  const seen=Object.keys(state.seen).length;
  const mas=Object.keys(state.mastered).length;
  const wr=Object.keys(state.wrong).length;
  const acc= state.attempts? Math.round(state.correct/state.attempts*100):0;
  view.innerHTML=`
    <div class="statgrid">
      <div class="stat"><div class="n">${total}</div><div class="l">कुल प्रश्न</div></div>
      <div class="stat"><div class="n">${seen}</div><div class="l">अब तक देखे</div></div>
      <div class="stat m"><div class="n">${mas}</div><div class="l">⭐ याद हो गए</div></div>
      <div class="stat b"><div class="n">${wr}</div><div class="l">🔁 गलत वाले</div></div>
      <div class="stat g"><div class="n">${acc}%</div><div class="l">सटीकता</div></div>
      <div class="stat"><div class="n">${state.attempts}</div><div class="l">कुल प्रयास</div></div>
    </div>
    <div style="margin-top:18px;display:flex;flex-direction:column;gap:10px">
      <button class="btn" onclick="resetProgress('wrong')">🔁 'गलत वाले' लिस्ट खाली करें</button>
      <button class="btn danger" onclick="resetProgress('all')">🗑️ सारी प्रगति रीसेट करें</button>
    </div>
    <p style="color:var(--muted);font-size:12.5px;margin-top:18px;text-align:center">
      प्रगति इसी फ़ोन/ब्राउज़र में सेव रहती है। ऑफलाइन भी चलता है।</p>`;
}

function resetProgress(kind){
  if(kind==='wrong'){ if(!confirm("'गलत वाले' लिस्ट खाली करें?")) return; state.wrong={}; }
  else { if(!confirm('सारी प्रगति मिटाएँ? यह वापस नहीं होगा।')) return;
    state={wrong:{},mastered:{},seen:{},correct:0,attempts:0}; }
  save(); updateHeader(); renderStats();
}

document.querySelectorAll('nav.tabs button').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));

// boot
load();
function boot(j){ DATA = j.questions||j; setTab('practice'); }
if (window.QUESTIONS) {              // standalone single-file build (embedded data)
  boot(window.QUESTIONS);
} else {                             // served folder: load questions.json
  fetch('questions.json',{cache:'no-store'})
    .then(r=>r.json()).then(boot)
    .catch(e=>{
      document.getElementById('view').innerHTML =
       `<div class="empty"><div class="big">⚠️</div><b>questions.json लोड नहीं हुआ</b>
        <p style="font-size:13px">फ़ोन पर इस्तेमाल के लिए <b>UPTET-Quiz.html</b> (सिंगल फ़ाइल) खोलें — वह बिना सर्वर के चलती है।</p></div>`;
    });
}
</script>
</body>
</html>
