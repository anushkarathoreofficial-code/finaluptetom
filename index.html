<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4f46e5">
<title>UPTET Quiz</title>
<style>
  :root{
    --bg:#0f1220; --card:#1a1f35; --card2:#232a45; --ink:#eef1ff; --muted:#9aa3c7;
    --brand:#6366f1; --brandd:#4f46e5; --good:#22c55e; --goodbg:#0e3a22;
    --bad:#ef4444; --badbg:#3a1414; --line:#2c3354; --gold:#f5b301;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans Devanagari",Roboto,sans-serif;
    font-size:17px; line-height:1.55; padding-bottom:88px;
  }
  header{
    position:sticky;top:0;z-index:20;background:linear-gradient(135deg,var(--brandd),var(--brand));
    padding:14px 16px 10px; box-shadow:0 4px 18px rgba(0,0,0,.35);
  }
  .htop{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .htop h1{font-size:18px;margin:0;font-weight:800;letter-spacing:.3px}
  .pill{background:rgba(255,255,255,.18);padding:3px 10px;border-radius:999px;font-size:12.5px;font-weight:700}
  .bar{height:7px;background:rgba(255,255,255,.22);border-radius:999px;margin-top:10px;overflow:hidden}
  .bar > i{display:block;height:100%;background:#fff;width:0;transition:width .35s ease}
  .barlbl{font-size:11.5px;opacity:.92;margin-top:5px;display:flex;justify-content:space-between}

  .wrap{max-width:640px;margin:0 auto;padding:16px}

  .controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  select,.btn{
    background:var(--card2);color:var(--ink);border:1px solid var(--line);
    border-radius:12px;padding:10px 12px;font-size:14px;font-weight:600;
  }
  select{flex:1;min-width:140px}
  .btn{cursor:pointer}
  .btn.ghost{background:transparent}

  .meta{font-size:12.5px;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between;gap:8px}
  .subj{background:var(--card2);color:#c7cef5;padding:2px 9px;border-radius:999px;font-weight:700;font-size:12px}

  .qcard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 8px 26px rgba(0,0,0,.28)}
  .qtext{font-size:19px;font-weight:700;line-height:1.5;margin:2px 0 16px}
  .qtext .num{color:var(--brand);font-weight:800;margin-right:6px}

  .opt{
    display:flex;align-items:flex-start;gap:11px;width:100%;text-align:left;
    background:var(--card2);border:1.5px solid var(--line);border-radius:13px;
    padding:13px 14px;margin-bottom:10px;color:var(--ink);font-size:16.5px;
    cursor:pointer;transition:.12s; font-weight:600;
  }
  .opt:active{transform:scale(.992)}
  .opt .lab{flex:0 0 26px;height:26px;border-radius:50%;background:var(--bg);
    display:grid;place-items:center;font-size:13px;font-weight:800;color:var(--muted);border:1px solid var(--line)}
  .opt.correct{background:var(--goodbg);border-color:var(--good)}
  .opt.correct .lab{background:var(--good);color:#04210f;border-color:var(--good)}
  .opt.wrong{background:var(--badbg);border-color:var(--bad)}
  .opt.wrong .lab{background:var(--bad);color:#2a0606;border-color:var(--bad)}
  .opt.dim{opacity:.55}
  .opt[disabled]{cursor:default}

  .reveal{margin-top:6px;border-radius:14px;overflow:hidden;border:1px solid var(--line);display:none}
  .reveal.show{display:block;animation:rise .25s ease}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .verdict{padding:11px 14px;font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px}
  .verdict.ok{background:var(--goodbg);color:#7ff0a8}
  .verdict.no{background:var(--badbg);color:#ff9a9a}
  .block{padding:13px 14px;border-top:1px solid var(--line)}
  .block h4{margin:0 0 5px;font-size:12px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted)}
  .block p{margin:0;font-size:15.5px;line-height:1.55}
  .mnem{background:#1d2746}
  .mnem p{color:#ffe7a3}
  .mnem h4{color:var(--gold)}

  .nav{display:flex;gap:10px;margin-top:16px}
  .nav .btn{flex:1;text-align:center;padding:14px;font-size:16px;border-radius:14px}
  .primary{background:var(--brand);border-color:var(--brand);color:#fff}

  .empty{text-align:center;color:var(--muted);padding:60px 20px}
  .empty .big{font-size:46px;margin-bottom:10px}

  /* bottom tabs */
  nav.tabs{
    position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;
    background:var(--card);border-top:1px solid var(--line);
    padding:6px 6px calc(6px + env(safe-area-inset-bottom));
  }
  nav.tabs button{
    flex:1;background:none;border:0;color:var(--muted);font-size:11px;font-weight:700;
    display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;cursor:pointer;border-radius:10px;
  }
  nav.tabs button .ic{font-size:20px}
  nav.tabs button.on{color:var(--brand)}
  nav.tabs button .cnt{position:absolute;transform:translate(16px,-6px);background:var(--bad);color:#fff;
    font-size:10px;min-width:16px;height:16px;border-radius:999px;display:grid;place-items:center;padding:0 4px;font-weight:800}

  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;text-align:center}
  .stat .n{font-size:30px;font-weight:800}
  .stat .l{font-size:12.5px;color:var(--muted);margin-top:3px}
  .stat.g .n{color:var(--good)} .stat.b .n{color:var(--bad)} .stat.m .n{color:var(--gold)}
  .danger{color:#ff9a9a;border-color:#5a2a2a}
</style>
<script>window.QUESTIONS = {"meta": {"title": "UPTET Primary (I-V) — Previous Year Questions", "years": ["2021", "2019", "2018", "2017"]}, "questions": [{"id": "p08-0000", "year": "2021", "src": "UPTET 2021", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Which of the following is NOT the main views of learning given by thorndike?/थार्नडाइक के द्वारा दिया गया अधिगम का मुख्य नियम नहीं है?", "options": ["Law of Exercise/अभ्यास का नियम", "Law of Readiness/तत्परता का नियम", "Law of Effect/प्रभाव का नियम", "Law of attitude/अभिवृत्ति का नियम"], "answer": 3, "summary": "थार्नडाइक द्वारा दिए गए अधिगम के मुख्य तीन नियम हैं - अभ्यास का नियम, तत्परता का नियम और प्रभाव का नियम। अभिवृत्ति का नियम इनमें शामिल नहीं है।", "mnemonic": "Thorndike ke 3 niyam: Exercise, Readiness, Effect - 'ERE'; Attitude bahar."}, {"id": "p08-0001", "year": "2021", "src": "UPTET 2021", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Kohler and Kofka believed learning to a function of -/कोहलर तथा कॉफ्का के अनुसार अधिगम होता है-", "options": ["Imitation/अनुकरण द्वारा", "Trial effort/प्रयास द्वारा", "Insight/सूझ द्वारा", "Exercise/अभ्यास द्वारा"], "answer": 2, "summary": "कोहलर तथा कॉफ्का गेस्टाल्टवादी थे, जिनके अनुसार अधिगम सूझ या अंतर्दृष्टि द्वारा होता है।", "mnemonic": "Kohler-Koffka Gestalt = Insight/Soojh se seekhna."}, {"id": "p08-0002", "year": "2021", "src": "UPTET 2021", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Who was the father of social constructivism?/सामाजिक निर्माणवाद के जनक कौन थे?", "options": ["Novak/नोवाक", "Vygotsky/वायगोत्सकी", "Piaget/पियाजे", "Glaserfied/ग्लासरफील्ड"], "answer": 1, "summary": "सामाजिक निर्माणवाद के जनक वायगोत्सकी हैं, जिन्होंने सीखने में सामाजिक एवं सांस्कृतिक कारकों पर बल दिया।", "mnemonic": "Social constructivism = Vygotsky (Social = V)."}, {"id": "p08-0003", "year": "2021", "src": "UPTET 2021", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Which of the following is not a characteristic of development?/निम्न में से कौन विकास का विशेषता नहीं है?", "options": ["To be cumulative/संचयी होना", "To be Directional./दिशात्मक होना", "To be specific./विशिष्ट होना", "To be uncontrolled and independent./अनियंत्रित एवं स्वतंत्र होना"], "answer": 3, "summary": "विकास संचयी, दिशात्मक एवं विशिष्ट होता है; अनियंत्रित एवं स्वतंत्र होना विकास की विशेषता नहीं है।", "mnemonic": "Vikas controlled hota hai - uncontrolled/independent NAHI."}, {"id": "p08-0004", "year": "2021", "src": "UPTET 2021", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Author of the book 'Hereditary Genius' is :/'हेरिडिटरी जीनियस' पुस्तक के लेखक हैं -", "options": ["Hurlock/हरलॉक", "Galton/गाल्टन", "Woodworth/वुडवर्थ", "Ross/रॉस"], "answer": 1, "summary": "'हेरिडिटरी जीनियस' पुस्तक के लेखक गाल्टन हैं।", "mnemonic": "Hereditary Genius = Galton (G se G)."}, {"id": "p08-0005", "year": "2021", "src": "UPTET 2021", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Lowest level of cognitive achievement is :/संज्ञानात्मक उपलब्धि का न्यूनतम स्तर है-", "options": ["Understanding/बोध", "Knowledge/ज्ञान", "Application/अनुप्रयोग", "Evaluation/मूल्यांकन"], "answer": 1, "summary": "ब्लूम के संज्ञानात्मक उद्देश्य में ज्ञान सबसे निम्न स्तर है, उसके बाद बोध, अनुप्रयोग, विश्लेषण, संश्लेषण और मूल्यांकन आते हैं।", "mnemonic": "Bloom ka sabse neeche = Knowledge/Gyaan."}, {"id": "p08-0006", "year": "2021", "src": "UPTET 2021", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "The last step of microteaching is :/सूक्ष्म-शिक्षण का अंतिम सोपान है-", "options": ["Feedback/प्रतिपुष्टि", "Re-planning/पुन: योजना", "Re-feedback/पुन: प्रतिपुष्टि", "Re-teaching/पुन: शिक्षण"], "answer": 2, "summary": "सूक्ष्म-शिक्षण का अंतिम अर्थात अंतिम सोपान पुन: प्रतिपुष्टि (Re-feedback) है।", "mnemonic": "Microteaching ka last step = Re-feedback (Punah pratipushti)."}, {"id": "p08-0007", "year": "2021", "src": "UPTET 2021", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "According to 'Guilford', divergent thinking requires :/गिल्फोर्ड के अनुसार अपसारी चिंतन में आवश्यक है-", "options": ["Categorization./वर्गीकरण", "Fluency of ideas./विचारों की प्रवाहशीलता", "Arithmatical reasoning./अंकगणितीय तर्क", "One solution./एक समाधान"], "answer": 1, "summary": "गिल्फोर्ड के अनुसार अपसारी चिंतन में विचारों की प्रवाहशीलता आवश्यक होती है, जिसमें अनेक समाधान खोजे जाते हैं।", "mnemonic": "Guilford divergent = ideas ki Fluency (anek solutions)."}, {"id": "p08-0008", "year": "2021", "src": "UPTET 2021", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Who is the propounder of Brain-storming method?/मस्तिष्क उद्वलन विधि के प्रतिपादक कौन हैं?", "options": ["John Dewey/जॉन डीवी", "Osborn/ऑसबोर्न", "Hurlock/हरलॉक", "Ausubel/ऑसुबेल"], "answer": 1, "summary": "मस्तिष्क उद्वलन (Brain-storming) विधि के प्रतिपादक ऑसबोर्न हैं।", "mnemonic": "Brain-storming = Osborn (O se O)."}, {"id": "p08-0009", "year": "2021", "src": "UPTET 2021", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Who is associated with Thematic Apperception test./प्रसंगात्मक अंतर्बोध परीक्षण से कौन सम्बंधित है?", "options": ["C.D. Morgan/सी.डी. मॉर्गन", "H.A. Murray/एच.ए. मुर्रे", "Both (a) and (b)/(a) एवं (b) दोनों", "J.L. Moreno/जे.एल. मोरेनो"], "answer": 2, "summary": "प्रसंगात्मक अंतर्बोध परीक्षण (TAT) सी.डी. मॉर्गन एवं एच.ए. मुर्रे दोनों से सम्बंधित है।", "mnemonic": "TAT = Morgan + Murray dono (Both a and b)."}, {"id": "p08-0010", "year": "2021", "src": "UPTET 2021", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "First stage of creative thinking is known as :/सर्जनात्मक चिंतन की प्रथम अवस्था कहलाती है-", "options": ["Preparation/आयोजन", "Incubation/उद्भवन", "Illumination/प्रकाश", "Revision/संशोधन"], "answer": 0, "summary": "सर्जनात्मक चिंतन की प्रथम अवस्था आयोजन (Preparation) है, इसके बाद उद्भवन, प्रकाश और सत्यापन आते हैं।", "mnemonic": "Creative thinking first = Preparation/Aayojan."}, {"id": "p08-0011", "year": "2021", "src": "UPTET 2021", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Stimulus Response theory was propounded by:/उद्दीपक अनुक्रिया सिद्धांत का प्रतिपादन किया गया-", "options": ["Thorndike/थार्नडाइक", "Gestalt/गेस्टाल्ट", "Both of the above/उपर्युक्त दोनों", "None of the above/इनमें से कोई नहीं"], "answer": 0, "summary": "उद्दीपक अनुक्रिया सिद्धांत का प्रतिपादन थार्नडाइक ने किया, जिसके अधिगम के तीन मुख्य नियम हैं।", "mnemonic": "Stimulus-Response (S-R) = Thorndike."}, {"id": "p08-0012", "year": "2021", "src": "UPTET 2021", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Which factors affect learning :/कौन-से कारक अधिगम को प्रभावित करते हैं?", "options": ["Personal factor/व्यक्तिगत कारक", "Environmental factor/वातावरण सम्बन्धी कारक", "Social factor/सामाजिक कारक", "All of the above/उपर्युक्त सभी"], "answer": 3, "summary": "अधिगम को व्यक्तिगत, वातावरण सम्बन्धी और सामाजिक सभी कारक प्रभावित करते हैं।", "mnemonic": "Learning ko sabhi affect karte = All of the above."}, {"id": "p08-0013", "year": "2021", "src": "UPTET 2021", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Who gave the concept of multiple intelligence./बहुबुद्धि का सिद्धांत किसने दिया था-", "options": ["Piaget/पियाजे", "Bruner/ब्रूनर", "Gardner/गार्डनर", "Vygotsky/वायगोत्सकी"], "answer": 2, "summary": "बहुबुद्धि का सिद्धांत गार्डनर द्वारा दिया गया, जिसमें उन्होंने विभिन्न प्रकार की बुद्धियों का वर्णन किया।", "mnemonic": "Multiple intelligence = Gardner."}, {"id": "p08-0014", "year": "2021", "src": "UPTET 2021", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Spearman has given :/स्पीयरमैन ने दिया-", "options": ["Two factor theory of intelligence/बुद्धि का द्विकारक सिद्धांत", "Group factor theory of intelligence/बुद्धि का समूहकारक सिद्धांत", "Multi factor theory of intelligence/बुद्धि का बहुकारक सिद्धांत", "None of the above/इनमें से कोई नहीं"], "answer": 0, "summary": "स्पीयरमैन ने बुद्धि का द्विकारक सिद्धांत दिया, जिसमें सामान्य कारक (G-Factor) और विशिष्ट कारक (S-Factor) शामिल हैं।", "mnemonic": "Spearman = Two factor (G ान्तरण तकनीकी"], "answer": 2, "summary": "स्किनर के अधिगम सिद्धान्त में अभिक्रमित अनुदेशन, व्यक्ति निर्धारित अनुदेशन व व्यवहार रूपान्तरण शामिल हैं, किन्तु त्रुटियों के माध्यम से सीखना उससे सम्बन्धित नहीं है।", "mnemonic": "Skinner = programmed, personalized, behaviour MOD; errors se seekhna NAHI"}, {"id": "p08-0026", "year": "2021", "src": "UPTET 2021", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Which of the following is more useful for the students of different abilities and interest? विभिन्न योग्यताओं एवं रुचियों वाले विद्यार्थियों हेतु कौन-सा मूल्यांकन अधिक उपयोगी होगा?", "options": ["(1) Internal Evaluation/आंतरिक मूल्यांकन", "(2) Summative Evaluation/योगात्मक मूल्यांकन", "(3) Practical Evaluation/प्रायोगिक मूल्यांकन", "(4) Continuous and Comprehensive Evaluation/सतत एवं व्यापक मूल्यांकन"], "answer": 3, "summary": "विभिन्न योग्यताओं एवं रुचियों वाले विद्यार्थियों हेतु सतत एवं व्यापक मूल्यांकन सर्वाधिक उपयोगी है।", "mnemonic": "Alag-alag ability ke liye = CCE (Satat aur Vyapak)"}, {"id": "p08-0027", "year": "2021", "src": "UPTET 2021", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Which of the following is NOT related to the Cognitive domain of Bloom's taxonomy of instructional objectives? निम्न में से कौन अनुदेशनात्मक उद्देश्यों के सम्बन्धित ब्लूम के वर्गीकरण के संज्ञानात्मक पक्ष से सम्बन्धित नहीं है—", "options": ["Comprehension/अवबोध", "Knowledge/ज्ञान", "Character building/चरित्र निर्माण", "Analysis/विश्लेषण"], "answer": 2, "summary": "ब्लूम के संज्ञानात्मक पक्ष में ज्ञान, अवबोध, अनुप्रयोग, विश्लेषण, संश्लेषण व मूल्यांकन आते हैं; चरित्र निर्माण इसमें सम्मिलित नहीं है।", "mnemonic": "Bloom cognitive = Knowledge se Evaluation; Charitra nirman NAHI"}, {"id": "p08-0028", "year": "2021", "src": "UPTET 2021", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Which of the following is NOT the level of teaching?निम्न में से कौन-सा शिक्षण का स्तर नहीं है?", "options": ["Memory Level/स्मृति स्तर", "Motivational Level/अभिप्रेरणा स्तर", "Understanding Level/अवबोध स्तर", "Reflective Level/परावर्ती स्तर"], "answer": 1, "summary": "शिक्षण के स्तर (Levels of Teaching) में स्मृति स्तर, अवबोध स्तर एवं परावर्ती (चिंतन) स्तर आते हैं; अभिप्रेरणा स्तर शिक्षण का स्तर नहीं है।", "mnemonic": "Teaching levels = Smriti, Avabodh, Reflective; Abhiprerna NAHI"}, {"id": "p08-0029", "year": "2021", "src": "UPTET 2021", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Psycho-social theory of development was propounded by ।विकास का मनोसामाजिक सिद्धान्त का प्रतिपादन किया गया—", "options": ["Thorndike/थॉर्नडाइक ने", "Erykson/एरिक्सन ने", "Skinner/स्किनर ने", "Hurlock/हरलॉक ने"], "answer": 1, "summary": "विकास के मनोसामाजिक सिद्धान्त (Psycho-social theory) का प्रतिपादन एरिक्सन ने किया था।", "mnemonic": "Psycho-social = Erikson"}, {"id": "p08-0030", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "''बीना'' का तत्सम क्या है?", "options": ["वीणा", "वीना", "वयन", "बयन"], "answer": 0, "summary": "''बीना'' का तत्सम शब्द ''वीणा'' है, जो वाद्ययंत्र का बोध कराता है।", "mnemonic": "Beena ka tatsam = VEENA (vaadya yantra)"}, {"id": "p08-0031", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "''धुमकेतु'' का पर्यायवाची क्या है?", "options": ["अंगार", "अग्नि", "अरुण", "आकाश"], "answer": 1, "summary": "''धूमकेतु'' का पर्यायवाची शब्द 'अग्नि' है।", "mnemonic": "Dhumketu = Agni ka paryayvachi"}, {"id": "p08-0032", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "निम्नलिखित गद्यांश को पढ़कर उत्तर दीजिए।आज विज्ञान मनुष्यों के हाथों में अद्भुत और अतुल शक्ति दे रहा है, इसका उपयोग एक व्यक्ति और समूह के दबाने और दूसरे व्यक्ति और समूह के लिए विकास का अद्भुत अवसर बन सकता है। ........ उपर्युक्त गद्यांश में कौन मनुष्य के हाथों में अद्भुत और अतुल शक्ति दे रहा है?", "options": ["विज्ञान", "साहित्य", "वाणिज्य", "कला"], "answer": 0, "summary": "उपर्युक्त गद्यांश के अनुसार विज्ञान मनुष्य के हाथों में अद्भुत और अतुल शक्ति दे रहा है।", "mnemonic": "Adbhut shakti deta hai = Vigyan"}, {"id": "p08-0033", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "कथन-कहानी के लेखक हैं?", "options": ["प्रेमचंद", "जयशंकर प्रसाद", "महादेवी वर्मा", "रामेश्वर पाण्डेय"], "answer": 1, "summary": "''कथन-कहानी के लेखक कथा साहित्य में अपने विशिष्ट हैं'' एक के रूप में।", "mnemonic": "Kathan-kahani = Jaishankar Prasad"}, {"id": "p08-0034", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "उचित उदय तिथि मंथ पर पधार बाँ संगीत बिनकेसे संगीत संरोग सरग, हाथों संगीत श्रृंग। उपर्युक्त पंक्ति में अलंकार है—", "options": ["रूपक", "उपमा", "उत्प्रेक्षा", "श्लेषानुप्रास"], "answer": 0, "summary": "उपर्युक्त पंक्ति में रूपक अलंकार है।", "mnemonic": "Yeh pankti = Rupak alankar"}, {"id": "p08-0035", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "''उससे बैठा नहीं जाता है'' में कौन-सा वाच्य है?", "options": ["भावबाच्य", "कर्मवाच्य", "कर्तृवाच्य", "कर्ता वाच्य"], "answer": 0, "summary": "''उससे बैठा नहीं जाता है'' वाक्य में भाववाच्य है, जिसमें भाव की प्रधानता रहती है।", "mnemonic": "Usse baitha nahi jaata = Bhaavvachya"}, {"id": "p08-0036", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "''राम धीरे-धीरे पढ़ता है।'' में कौन-सा अव्यय है?", "options": ["सम्बन्धबोधक अव्यय", "क्रियाविशेषण अव्यय", "समुच्चयबोधक अव्यय", "विस्मयादिबोधक अव्यय"], "answer": 1, "summary": "''राम धीरे-धीरे पढ़ता है'' में 'धीरे-धीरे' क्रिया की विशेषता बताने वाला क्रियाविशेषण अव्यय है।", "mnemonic": "Dheere-dheere padhta = Kriyavisheshan avyay"}, {"id": "p08-0037", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "''हिमालय से गंगा निकलती है'' में किस कारक का प्रयोग हुआ है?", "options": ["अपादान", "कर्म", "करण", "सम्बन्ध"], "answer": 0, "summary": "''हिमालय से गंगा निकलती है'' में जहाँ अलगाव का बोध होता है, वहाँ अपादान कारक होता है।", "mnemonic": "Se nikalti hai (alagav) = Apadan karak"}, {"id": "p08-0038", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "''वह खेल रहा है'' में किस प्रकार की क्रिया है?", "options": ["अकर्मक", "अप्रत्यय", "सकर्मक", "संयुक्त क्रिया"], "answer": 0, "summary": "''वह खेल रहा है'' में कर्म की आवश्यकता नहीं, अतः यह अकर्मक क्रिया है।", "mnemonic": "Khel raha hai (no karm) = Akarmak kriya"}, {"id": "p08-0039", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "''चमचमात चंचल नयन बिच घूघट पट छीन। मानहु सुरसरिता विमल जल उछलत जुग मीन।'' इस पंक्ति में कौन-सा अलंकार है?", "options": ["उपमा", "रूपक", "विरोधाभास", "उत्प्रेक्षा"], "answer": 3, "summary": "इस पंक्ति में 'मानहु' शब्द के प्रयोग से उत्प्रेक्षा अलंकार है।", "mnemonic": "'Manhu' aaye = Utpreksha alankar"}, {"id": "p08-0040", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "''सूरज का सातवाँ घोड़ा'' ''गुनाहों का देवता'' किसकी रचनाएँ हैं?", "options": ["मोहन राकेश", "धर्मवीर भारती", "उपेन्द्र", "धर्मवीर भारती"], "answer": 1, "summary": "''सूरज का सातवाँ घोड़ा'' तथा ''गुनाहों का देवता'' दोनों धर्मवीर भारती की रचनाएँ हैं।", "mnemonic": "Suraj ka satvaan ghoda + Gunahon ka devta = Dharmveer Bharti"}, {"id": "p08-0041", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "'व' का उच्चारण स्थान क्या है?", "options": ["दन्तोष्ठ्य", "कण्ठ्य", "दन्त्य", "कण्ठ-तालव्य"], "answer": 0, "summary": "जो ध्वनि दंत और ओष्ठ के सहयोग से उत्पन्न होती है, दन्तोष्ठ्य कहलाती है; 'व' इसका उदाहरण है।", "mnemonic": "'Va' = Dantoshthya (dant + oshth)"}, {"id": "p08-0042", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "''अग्नि'' का विशेषण क्या है?", "options": ["अग्नि", "आग्नेय", "अग्नेय", "आग"], "answer": 1, "summary": "संज्ञा अथवा सर्वनाम की विशेषता बताने वाले शब्द विशेषण कहलाते हैं; 'अग्नि' का विशेषण 'आग्नेय' है।", "mnemonic": "Agni ka visheshan = Aagneya"}, {"id": "p08-0043", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "'तेजाब' में कौन सी संज्ञा है?", "options": ["भाववाचक संज्ञा", "व्यक्तिवाचक संज्ञा", "द्रव्यवाचक संज्ञा", "समूहवाचक संज्ञा"], "answer": 2, "summary": "जिस शब्द से किसी द्रव्य का बोध हो उसे द्रव्यवाचक संज्ञा कहते हैं; तेजाब इसका उदाहरण है।", "mnemonic": "Tezaab (dravya) = Dravyavachak sangya"}, {"id": "p08-0044", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "'नाव जल से तैरती है' में कौन-सा कारक है?", "options": ["सम्प्रदान कारक", "सम्बंध कारक", "करण कारक", "अधिकरण कारक"], "answer": 3, "summary": "जिस शब्द से क्रिया का बोध हो, उसे 'अधिकरण कारक' कहते हैं।", "mnemonic": "Naav jal se tairti = Adhikaran karak"}, {"id": "p08-0045", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "'महेंद्र' का संधि विच्छेद क्या है?", "options": ["महा + ईन्द्र", "महा + इन्द्र", "मह + इन्द्र", "महा + ईंद्र"], "answer": 1, "summary": "'महेन्द्र' का संधि विच्छेद महा + इन्द्र है; अ या आ के बाद इ या ई हो तो उनके स्थान पर 'ए' होता है (गुण संधि)।", "mnemonic": "Mahendra = Maha + Indra (Gun sandhi)"}, {"id": "p08-0046", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "'सेर को सवा सेर' लोकोक्ति का क्या अर्थ है?", "options": ["समानता", "बढ़कर दूसरा", "एक बराबर", "तह करना"], "answer": 1, "summary": "'सेर को सवा सेर' लोकोक्ति का अर्थ है—'एक से बढ़कर दूसरा' अर्थात किसी की समानता या उससे बढ़ा-चढ़ा होना।", "mnemonic": "Ser ko sawa ser = ek se badhkar dusra"}, {"id": "p08-0047", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "''खाने की इच्छा'' के लिए एक शब्द बताइये।", "options": ["तिथ्या", "भुक्षा", "निरीहा", "क्षुधा"], "answer": 3, "summary": "''खाने की इच्छा'' के लिए एक शब्द 'क्षुधा' है।", "mnemonic": "Khane ki ichchha = Kshudha"}, {"id": "p08-0048", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "''किंडरगार्टन शिक्षण पद्धति'' के जन्मदाता शिक्षा शास्त्री है—", "options": ["कार्लटन वाशबर्न", "हैबार्ट", "फ्रोबेल", "महात्मा गाँधी"], "answer": 2, "summary": "''किंडरगार्टन शिक्षण पद्धति'' के जन्मदाता जर्मनी के प्रसिद्ध शिक्षाशास्त्री फ्रोबेल हैं।", "mnemonic": "Kindergarten = Froebel"}, {"id": "p08-0049", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "''प्रथा'' का विलोम शब्द है—", "options": ["अंतिम", "अपर", "प्रशान्त", "अप्रशान्त"], "answer": 1, "summary": "जिस शब्द का अर्थ होता है उल्टा, उसके अर्थ के विपरीत अर्थ प्रकट करने वाले शब्द विलोम कहलाते हैं; 'प्रथा' का विलोम 'अपर' है।", "mnemonic": "Pratha ka vilom = Apar"}, {"id": "p08-0050", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "उपचारात्मक शिक्षण में किस अध्यापन प्रक्रिया का प्रयोग अधिक किया जाता है?", "options": ["सामूहिक", "व्यक्तिगत", "चर्चा", "वाचन"], "answer": 1, "summary": "उपचारात्मक शिक्षण में छात्र की कमियों को दूर करने के लिए व्यक्तिगत अध्यापन प्रक्रिया का प्रयोग अधिक किया जाता है।", "mnemonic": "Upcharatmak shikshan = Vyaktigat adhyapan"}, {"id": "p08-0051", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "''सखी पिया को जो मैं न देखूँ तो कैसे काटूँ अंधेरी रतियाँ'' किस कवि की रचना पंक्तियाँ हैं?", "options": ["सूरदास", "अमीर खुसरो", "तुलसी", "कबीर"], "answer": 1, "summary": "''सखी पिया को जो मैं न देखूँ ...'' पंक्तियाँ अमीर खुसरो (1253-1325) की रचना हैं।", "mnemonic": "Sakhi piya ko = Amir Khusro"}, {"id": "p08-0052", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "'उड्डयन' आत्मकथा के लेखक हैं-", "options": ["गुलशेरानन्द", "केशव भारती", "अभयकाशी नागबीर्क", "अमृतलाल नागर"], "answer": 3, "summary": "'उड्डयन' आत्मकथा के लेखक अमृतलाल नागर हैं, जिनका जन्म 1916 ई. में हुआ था।", "mnemonic": "Uddayan = Amritlal Nagar, 'Amrit' udta hai aakash mein."}, {"id": "p08-0053", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "'सबल बाग दिखाना' मुहावरे का अर्थ है-", "options": ["भूल लग जाना", "विस्तृत अनुभव होना", "पीढ़ा सहना", "अच्छी बातें कहकर बहकाना"], "answer": 3, "summary": "'सबल बाग दिखाना' मुहावरे का अर्थ है- अच्छी बातें कहकर बहकाना।", "mnemonic": "Sabz bagh dikhana = jhuthe sapne dikhakar behkana."}, {"id": "p08-0054", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "जब कार्य एक क्रिया समाप्त करके दूसरी क्रिया से संलग्न होता है, तो पहली क्रिया क्या कहलाती है?", "options": ["इच्छाबोधक क्रिया", "नामबोधक क्रिया", "पूर्वकालिक क्रिया", "सहायक क्रिया"], "answer": 2, "summary": "जब एक क्रिया समाप्त करके दूसरी क्रिया से संलग्न होता है, तो पहली क्रिया पूर्वकालिक क्रिया कहलाती है।", "mnemonic": "Pehle wali kriya = Poorvkalik (poorv = pehle)."}, {"id": "p08-0055", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "'मूले काल सकल मरि जाहीं। जब बसन्त ऋतु इन्ह सम्बाहर हैं।' इन काव्य पंक्तियों में कौन-सा अलंकार है?", "options": ["उत्प्रेक्षा", "उपमा", "रूपक", "अन्योक्ति"], "answer": 3, "summary": "इन काव्य पंक्तियों में 'घर', 'पहाड़' और 'नदी' किस संज्ञा के अंतर्गत आएगा से सम्बंधित प्रश्न में अन्योक्ति अलंकार है।", "mnemonic": "Doosre ke bahane apni baat = Anyokti."}, {"id": "p08-0056", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "'घर', 'पहाड़' और 'नदी' किस संज्ञा में के अंतर्गत आएगा?", "options": ["भाववाचक संज्ञा", "जातिवाचक संज्ञा", "द्रव्यवाचक संज्ञा", "गुणवाचक संज्ञा"], "answer": 1, "summary": "'घर', 'पहाड़' और 'नदी' जातिवाचक संज्ञा के अंतर्गत आएगा, क्योंकि ये किसी वस्तु व्यक्ति या जाति की समस्त इकाई के लिए प्रयुक्त होते हैं।", "mnemonic": "Ghar, pahaad, nadi = jaati (class) = Jativachak."}, {"id": "p08-0057", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "'उसने कुछ नहीं खाया' में 'कुछ' किस प्रकार का सर्वनाम का बोधक है?", "options": ["प्रश्नवाचक सर्वनाम", "सम्बन्धवाचक सर्वनाम", "निजवाचक सर्वनाम", "अनिश्चयवाचक सर्वनाम"], "answer": 3, "summary": "'उसने कुछ नहीं खाया' में 'कुछ' अनिश्चयवाचक सर्वनाम का बोधक है, क्योंकि किसी निश्चित वस्तु का बोध न होकर अनिश्चित वस्तु का बोध होता है।", "mnemonic": "'Kuch' = nishchit nahi = Anishchayvachak."}, {"id": "p08-0058", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "'नियम प्रणाली' का प्रयोग किस प्रकार की शिक्षण में होता है?", "options": ["व्याकरण शिक्षण प्रणाली", "व्रात शिक्षण प्रणाली", "कम्प्यूटर शिक्षण प्रणाली", "सह लेखन शिक्षण प्रणाली"], "answer": 0, "summary": "'नियम प्रणाली' का प्रयोग व्याकरण शिक्षण प्रणाली में अधिक किया जाता है।", "mnemonic": "Niyam = rules = Vyakaran (grammar) shikshan."}, {"id": "p08-0059", "year": "2021", "src": "UPTET 2021", "subject": "हिन्दी (भाषा-I)", "question": "'आप' का तत्सम क्या है?", "options": ["आत्मन", "आप्तम", "आत्मा", "आपन"], "answer": 0, "summary": "'आप' का तत्सम रूप 'आत्मन' होता है।", "mnemonic": "Aap ka tatsam = Aatman."}, {"id": "p08-0060", "year": "2021", "src": "UPTET 2021", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Choose an appropriate conjunction for the following sentence : Strike the iron ............... it is hot.", "options": ["As", "While", "Unless", "So"], "answer": 1, "summary": "रिक्त स्थान में 'While' का प्रयोग होगा क्योंकि यह 'is hot' के साथ उपयुक्त है।", "mnemonic": "Strike iron WHILE hot - jab garam ho tab."}, {"id": "p08-0061", "year": "2021", "src": "UPTET 2021", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Identify the correct passive voice for the sentence : 'Please sit down'", "options": ["One should sit down", "I asked him to sit", "You are requested to sit down", "Sit down"], "answer": 2, "summary": "'Please sit down' का passive voice है 'You are requested to sit down'। Rule: please + M V₃ + Object.", "mnemonic": "Please sit down = You are REQUESTED to sit down."}, {"id": "p08-0062", "year": "2021", "src": "UPTET 2021", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Which of the following alternatives is grammatically correct?", "options": ["Bread and milk are wholesome food", "Bread and milk is a wholesome food", "Bread and milk are a wholesome food", "Bread and milk is wholesome foods"], "answer": 1, "summary": "Bread and milk एक singular subject मानकर 'is' का प्रयोग होगा - 'Bread and milk is a wholesome food'।", "mnemonic": "Bread and milk = ek hi cheez = IS (singular)."}, {"id": "p08-0063", "year": "2021", "src": "UPTET 2021", "subject": "अंग्रेज़ी (भाषा-II)", "question": "What is the meaning of the word 'flake'?", "options": ["A piece of rain", "A small thin piece", "Both 1 and 2 are correct", "None of the above"], "answer": 1, "summary": "'flake' का अर्थ है- A small thin piece।", "mnemonic": "Flake = small thin piece (snowflake patla tukda)."}, {"id": "p08-0064", "year": "2021", "src": "UPTET 2021", "subject": "अंग्रेज़ी (भाषा-II)", "question": "'deep' and 'keep' are ............", "options": ["Simile", "Metaphor", "Rhyming words", "Alternative words"], "answer": 2, "summary": "'deep' और 'keep' Rhyming words हैं, क्योंकि इनकी ध्वनि या स्वर एक समान होते हैं।", "mnemonic": "deep-keep same sound = Rhyming words."}, {"id": "p08-0065", "year": "2021", "src": "UPTET 2021", "subject": "अंग्रेज़ी (भाषा-II)", "question": "The use of technology to enhance the learning process is called ................. in education.", "options": ["IT", "ICT", "Information technology", "Communication technology"], "answer": 1, "summary": "सीखने की प्रक्रिया को बढ़ाने के लिए तकनीक के उपयोग को शिक्षा में ICT (Information and Communication Technology) कहा जाता है।", "mnemonic": "Learning + technology = ICT."}, {"id": "p08-0066", "year": "2021", "src": "UPTET 2021", "subject": "अंग्रेज़ी (भाषा-II)", "question": "The sentence 'John will be leaving for England tomorrow' is in -", "options": ["Past Continuous Tense", "Present Indefinite Tense", "Future Continuous Tense", "Present Perfect Tense"], "answer": 2, "summary": "'John will be leaving for England tomorrow' Future Continuous Tense में है। Structure: Sub + will/shall + be + v + ing form + object.", "mnemonic": "will be + leaving (ing) = Future Continuous."}, {"id": "p08-0067", "year": "2021", "src": "UPTET 2021", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Which of the following is a complex sentence?", "options": ["She lives in a locality of her liking", "Ravi did not like that bearded man", "He reads what he likes", "Ramesh is a man of relaxed habits"], "answer": 2, "summary": "'He reads what he likes' एक complex sentence है, जिसमें एक main clause और एक subordinate (dependent) clause होता है।", "mnemonic": "He reads WHAT he likes = main + dependent = Complex."}, {"id": "p08-0068", "year": "2021", "src": "UPTET 2021", "subject": "अंग्रेज़ी (भाषा-II)", "question": "The teachers in English Medium Schools usually teach their students in :", "options": ["the direct method", "the audiolingual method", "the bilingual method", "the structural method"], "answer": 3, "summary": "English Medium Schools में शिक्षक सामान्यतः structural method से पढ़ाते हैं, जो भाषा के संरचनात्मक पहलू पर बल देती है।", "mnemonic": "English Medium = Structural method."}, {"id": "p08-0069", "year": "2021", "src": "UPTET 2021", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Find out the subject, in the following sentence : The beautiful rainbow soon faded away", "options": ["The beautiful", "Beautiful rainbow", "Rainbow soon faded away", "The beautiful rainbow"], "answer": 3, "summary": "'The beautiful rainbow soon faded away' sentence में subject है 'The beautiful rainbow', जो एक noun है जिस पर pronoun लगा सकते हैं।", "mnemonic": "Subject = The beautiful rainbow (poora noun phrase)."}, {"id": "p08-0070", "year": "2021", "src": "UPTET 2021", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Supply the correct article in the following sentence : Raghu is ...................... one-eyed man.", "options": ["A", "An", "The", "Some"], "answer": 0, "summary": "'one-eyed man' में 'one' का word अंक का होकर 'w' की ध्वनि देता है, इसलिए 'A' article का प्रयोग होगा - Raghu is a one-eyed man.", "mnemonic": "one-eyed = 'w' sound = use A."}, {"id": "p08-0071", "year": "2021", "src": "UPTET 2021", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Which of the following words is plural?", "options": ["Child", "Cattle", "Section", "Solution"], "answer": 1, "s 's rich immortals", "India's age-long culture and civilization", "India's bright future"], "answer": 2, "summary": "The Ganga is a symbol of India's age-long culture and civilization।", "mnemonic": "Ganga = age-long culture and civilization."}, {"id": "p08-0077", "year": "2021", "src": "UPTET 2021", "subject": "अंग्रेज़ी (भाषा-II)", "question": "What are the things loved by the author mentioned in the given passage?", "options": ["The snow-covered peaks of the Himalayas", "The rich fields and forests", "The flowing rivers and streams", "The snowy peaks and the deep valleys of the Himalayas"], "answer": 3, "summary": "passage में author ने Himalayas के snowy peaks और deep valleys को सबसे अधिक पसंद किया।", "mnemonic": "Author loves snowy peaks + deep valleys."}, {"id": "p08-0078", "year": "2021", "src": "UPTET 2021", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Fill in the blank with appropriate preposition in the following sentence : I must congratulate you ............... your exam result.", "options": ["At", "In", "On", "Upon"], "answer": 2, "summary": "congratulate शब्द के बाद 'on' preposition का प्रयोग होता है - I must congratulate you on your exam result।", "mnemonic": "congratulate ON something."}, {"id": "p08-0079", "year": "2021", "src": "UPTET 2021", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Fill in the blank with suitable article in the following sentence : Yesterday .............. European called at my office.", "options": ["A", "An", "The", "None of the above"], "answer": 0, "summary": "European word के पहले 'A' article का प्रयोग होगा क्योंकि 'Eu' की ध्वनि 'yu' (consonant) है, vowels (a, e, i, o, u) से पहले 'an' article का प्रयोग होता है।", "mnemonic": "European = 'yu' sound = use A."}, {"id": "p08-0080", "year": "2021", "src": "UPTET 2021", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Fill in the blank with the correct article in the following sentence : .............. Ganga is .............. sacred river.", "options": ["The, a", "The, the", "A, a", "A, an"], "answer": 0, "summary": "नदियों के नाम के पहले 'The' article का प्रयोग होता है - The Ganga is a sacred river।", "mnemonic": "Nadi = The Ganga; river = a sacred river."}, {"id": "p08-0081", "year": "2021", "src": "UPTET 2021", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Fill in the blank with correct conjunction. Walk quickly .............. you will not over-take him.", "options": ["Lest", "But", "And", "Else"], "answer": 3, "summary": "इस सentence में Else का प्रयोग होगा - Walk quickly else you will not over-take him।", "mnemonic": "Walk quickly ELSE you'll miss him."}, {"id": "p08-0082", "year": "2021", "src": "UPTET 2021", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Fill in the blanks with the correct article : .............. Rajdhani express is considered as one of .............. fastest train in India.", "options": ["The, a", "The, the", "A, an", "The, the"], "answer": 0, "summary": "'The, the' का प्रयोग होगा, क्योंकि सबसे पहले sentence में train एक superlative degree का प्रयोग किया गया है - The Rajdhani express को one of के साथ माना जाता है।", "mnemonic": "The Rajdhani; one of THE fastest."}, {"id": "p08-0083", "year": "2021", "src": "UPTET 2021", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Which prefix can be used before all the following words proper, polite, mortar, civil-", "options": ["Un-", "Il-", "Ir-", "Im-"], "answer": 3, "summary": "Im- (Proper, polite, mortar, movable) के चार correct prefix 'Im' का प्रयोग किया जाएगा - Improper, Impolite, Immortal आदि।", "mnemonic": "Improper, Impolite, Immortal = Im- prefix."}, {"id": "p08-0084", "year": "2021", "src": "UPTET 2021", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Which of the following words is an Abstract Noun?", "options": ["Gold", "Crowd", "Humanity", "Tea"], "answer": 2, "summary": "'Humanity' एक Abstract Noun है। Abstract noun- A non-physical phrase जो किसी abstract concept को व्यक्त करता है।", "mnemonic": "Humanity = bhaav = Abstract Noun."}, {"id": "p08-0085", "year": "2 ": "p08-0113", "year": "2021", "src": "UPTET 2021", "subject": "संस्कृत (भाषा-II)", "question": "कोयल को संस्कृत में कहते हैं—", "options": ["गरुणः", "व्यासः", "वाकेरः", "पिक:"], "answer": 3, "summary": "कोयल को संस्कृत में 'पिक:' कहते हैं।", "mnemonic": "Koyal = Pik"}, {"id": "p08-0114", "year": "2021", "src": "UPTET 2021", "subject": "संस्कृत (भाषा-II)", "question": "'अंगुली' का वाचक संस्कृत शब्द है—", "options": ["करः", "कराग्रजः", "करशाखा", "कन्धा"], "answer": 2, "summary": "'अंगुली' का वाचक संस्कृत शब्द 'कराग्रजः' है।", "mnemonic": "Anguli = Karagraja"}, {"id": "p08-0115", "year": "2021", "src": "UPTET 2021", "subject": "संस्कृत (भाषा-II)", "question": "'व्याकरण पद्धति' को विश्व में से किस अन्य नाम से भी जाना जाता है—", "options": ["हस्तरीय पद्धति", "पाठ्यांश पद्धति", "साधनात्मक पद्धति", "विश्लेषकरण"], "answer": 0, "summary": "'व्याकरण पद्धति' को पाठ्यांश पद्धति/हस्तरीय पद्धति नाम से भी जाना जाता है।", "mnemonic": "Vyakaran paddhati = Hastriya"}, {"id": "p08-0116", "year": "2021", "src": "UPTET 2021", "subject": "संस्कृत (भाषा-II)", "question": "निम्न में से कौन सा वाक्य का रूप नहीं है?", "options": ["पठ", "पठनीय", "पठैषी", "पठिता"], "answer": 1, "summary": "पठ, पठैषी, पठिता वाच्य रूप हैं परन्तु 'पठनीय' नहीं है।", "mnemonic": "Vakya roop nahi = Pathaniya"}, {"id": "p08-0117", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "If 15 workers can build a road in 48 hours, then the number of workers required to do the same work in 30 hours is :", "options": ["18", "24", "20", "46"], "answer": 1, "summary": "15 श्रमिक 48 घंटे में सड़क बनाते हैं; 30 घंटे में बनाने के लिए (15×48)/30 = 24 श्रमिक चाहिए (व्युत्क्रमानुपाती)।", "mnemonic": "15x48/30 = 24 workers"}, {"id": "p08-0118", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "The least positive digit x, 890 that the number 324x342 is divisible by 11 is :", "options": ["0", "1", "3", "5"], "answer": 1, "summary": "संख्या 324x342 के 11 से विभाज्य होने हेतु विषम-सम स्थानों के योग का अंतर 0 या 11 का गुणज हो, जिससे x=1 प्राप्त होता है।", "mnemonic": "324x342 div by 11 => x = 1"}, {"id": "p08-0119", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "The ratio of area of a circle and the maximum square inside it will be :", "options": ["Proportional to the radius of the circle", "Not depend upon the circle", "Proportional to the side of the square", "Equal to the diagonal of the circle"], "answer": 1, "summary": "वृत्त और उसके अंदर बनने वाले अधिकतम बड़े वर्ग के क्षेत्रफल का अनुपात वृत्त पर निर्भर नहीं करता (स्थिर रहता है)।", "mnemonic": "Circle:Square area ratio = constant, circle pe depend nahi"}, {"id": "p08-0120", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "A sum of ₹ 600 amount to be ₹ 720 in 4 year by simple interest what for its amount if the rate of interest is increased by 2%? ₹ 600 साधारण ब्याज की दर से 4 वर्ष में ₹ 720 हो जाता है। यदि ब्याज की दर 2% बढ़ा दिया जाये, तो वह धन कितना होगा—", "options": ["₹ 792", "₹ 768", "₹ 724", "₹ 748"], "answer": 1, "summary": "₹600 पर साधारण ब्याज की दर 5% थी; 2% बढ़ने पर 7% दर से 4 वर्ष का ब्याज ₹168 होकर कुल राशि ₹768 होगी।", "mnemonic": "5% se 7%, char saal, 600+168 = 768"}, {"id": "p08-0121", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "Which of the following is not true ? निम्नलिखित में कौन सही नहीं है—", "options": ["The sum of the two integers is an integer/ दो पूर्णांक का योग एक पूर्णांक होता है", "The sum of the two rational number is a rational number/दो परिमेय संख्याओं का योग एक परिमेय संख्या होती है", "The sum of the two irrational numbers is an irrational number/दो अपरिमेय संख्याओं का योग एक अपरिमेय संख्या होती है", "The sum of two natural numbers is a natural numbers/दो प्राकृतिक संख्याओं का योग एक प्राकृतिक संख्या होती है"], "answer": 2, "summary": "दो अपरिमेय संख्याओं का योग सदैव अपरिमेय नहीं होता; उदाहरण 4√5+2√5 तथा (2-√2)+√2 दर्शाते हैं कि योग परिमेय भी हो सकता है।", "mnemonic": "Do irrational ka jod hamesha irrational nahi"}, {"id": "p08-0122", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "A number exceeds 20% of itself by 60. The number is :/कोई संख्या अपने 20% से 60 अधिक है, वह संख्या है—", "options": ["55", "45", "65", "75"], "answer": 3, "summary": "x - 20% of x = 60, अर्थात् 80x/100 = 60 हल करने पर x = 75 प्राप्त होता है।", "mnemonic": "x ka 80% = 60, x = 75"}, {"id": "p08-0123", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "The natural number nearest to 3070 which in completely divisible by 17 is : संख्या 3070 के सर्वाधिक निकट 17 से पूरी तरह विभाजित होने वाली प्राकृतिक संख्या है—", "options": ["3060", "3070", "3077", "3068"], "answer": 2, "summary": "3070 के सबसे निकट 17 से विभाजित संख्या 3077 है।", "mnemonic": "3070 ke paas, 17 ka multiple = 3077"}, {"id": "p08-0124", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "The ratio of cost price and selling price is 5:4 then loss percentage is : क्रय मूल्य और विक्रय मूल्य का अनुपात 5:4 है, तो हानि प्रतिशत है—", "options": ["20%", "25%", "40%", "50%"], "answer": 0, "summary": "क्रय मूल्य 5x व विक्रय मूल्य 4x होने पर हानि x; हानि% = (x/5x)×100 = 20%।", "mnemonic": "5:4 ratio, loss x/5x = 20%"}, {"id": "p08-0125", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "If the diagonal of a cube is 8√3 and then its surface area is : यदि किसी घन का विकर्ण 8√3 सेमी. है, तो उसका पृष्ठीय क्षेत्रफल है—", "options": ["192 cm²", "512 cm²", "768 cm²", "384 cm²"], "answer": 3, "summary": "घन का विकर्ण a√3 = 8√3 से a = 8; पृष्ठीय क्षेत्रफल 6a² = 6×64 = 384 cm²।", "mnemonic": "a√3 = 8√3, a=8, 6×64 = 384"}, {"id": "p08-0126", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "Area of the part of 120° of a circle is 66/7 cm² then diameter of the circle is (π=22/7) एक वृत्त में 120° के खण्ड का क्षेत्रफल 66/7 सेमी² तो वृत्त का व्यास होगा। (π=22/7)—", "options": ["2 cm", "3.6 cm", "2.5 cm", "6 cm"], "answer": 3, "summary": "120° खण्ड क्षेत्रफल = (1/3)πr² = 66/7 हल करने पर r²=9, r=3 सेमी, व्यास d = 6 सेमी।", "mnemonic": "120 = 1/3 vrut, r=3, diameter=6"}, {"id": "p08-0127", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "If the diagonal of a square will be double then area square will be :/यदि किसी वर्ग के विकर्ण को दोगुना कर दिया जाये, तो क्षेत्रफल होगा—", "options": ["Three times/तीन गुना", "Four times/चार गुना", "Same as/उतना ही", "Eight times/आठ गुना"], "answer": 1, "summary": "विकर्ण d₁=√2a; विकर्ण दोगुना होने पर भुजा 2a हो जाती है, क्षेत्रफल = 4a² यानी चार गुना।", "mnemonic": "Diagonal double, area 4 guna"}, {"id": "p08-0128", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "Vinay sold a watch in ₹ 75. He gets profit as the same s cost price of the watch. The cost price of the watch is :/विनय एक घड़ी ₹ 75 में बेचता है, जिससे उसे घड़ी की लागत कीमत के बराबर प्रतिशत लाभ होता है, तो घड़ी की लागत मूल्य क्या है ?", "options": ["₹ 150", "₹ 175", "₹ 60", "₹ 50"], "answer": 3, "summary": "क्रय मूल्य x, लाभ% = x; (x²/100)=75-x हल करने पर x = 50, अतः क्रय मूल्य ₹50।", "mnemonic": "Profit% = cost, 75 bechi, cost = 50"}, {"id": "p08-0129", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "If the distance between the centres of two circles is less than the sum of radii of the two, then they:/यदि दो वृत्तों के केन्द्रों के बीच की दूरी उनकी त्रिज्याओं के योग से कम हो, तो वे दोनों वृत्त—", "options": ["Touch internally/अंतः स्पर्शी होंगे", "Touch externally/बाह्य स्पर्शी होंगे", "Intersect each other/प्रतिच्छेदन करेंगे", "Contains one the other/अन्तर्भुत करेंगे"], "answer": 2, "summary": "जब (r₂-r₁) < d < (r₂+r₁) हो, तो दोनों वृत्त एक-दूसरे को प्रतिच्छेदन करते हैं।", "mnemonic": "Distance < radii ka jod, circles intersect"}, {"id": "p08-0130", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "The missing number in the pattern 1,5,2,10 ......... 15,4,20 is :/अंक विन्यास 1,5,2,10 ......... 15,4,20 में विलुप्त संख्या है—", "options": ["0 (zero)/0 (शून्य)", "1 (one)/1 (एक)", "2 (Two)/2 (दो)", "3 (Three)/3 (तीन)"], "answer": 3, "summary": "क्रम में +5 तथा ×2 का पैटर्न है; 10 के बाद +5 करने पर 15 तथा 15 की पूर्व संख्या 3 है।", "mnemonic": "+5 aur ×2 pattern, missing = 3"}, {"id": "p08-0131", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "If a and b be any two positive integers which on division by 6 earn remainder 4 and 5 respectively. Now the remainder when a² + b² in divided by 6 is./यदि a और b धन पूर्णांक संख्याओं a² व b विभाजित करने पर a को 4 तथा b को 5 शेषफल प्राप्त होते हैं, तब  a² + b² को 6 से विभाजित करने पर शेषफल है—", "options": ["4", "5", "6", "1"], "answer": 3, "summary": "a को 6 से भाग देने पर शेष 4 और b को शेष 5; a²+b² को 6 से भाग देने पर शेषफल 1 बचेगा।", "mnemonic": "4 aur 5 sheh, a²+b² ka sheh = 1"}, {"id": "p08-0132", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "If the side of a square is increased by 10% then percentage increase in it's area will be : यदि किसी वर्ग की भुजा 10% की वृद्धि कर दी जाये, तो उसके क्षेत्रफल में कितने प्रतिशत की वृद्धि होगी?", "options": ["10%", "21%", "44%", "100%"], "answer": 1, "summary": "वर्ग की भुजा 100 मानकर 10% वृद्धि करने पर क्षेत्रफल में वृद्धि = (110²-100²)/100² ×100 = 21%।", "mnemonic": "Side +10%, area +21%"}, {"id": "p08-0133", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "The product of the age of Mohan before 5 year and after nine year is 15. Then Mohan present age is :/मोहन की 5 वर्ष पूर्व उम्र तथा 9 वर्ष बाद उम्र का गुणनफल 15 है। तब मोहन की वर्तमान आयु है—", "options": ["4", "5", "7", "6"], "answer": 3, "summary": "(x-5)(x+9)=15 हल करने पर x=6 (धन मान) प्राप्त होता है, अतः वर्तमान आयु 6 वर्ष।", "mnemonic": "(x-5)(x+9)=15, x=6"}, {"id": "p08-0134", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "The value (0.00032)^0.6 is : (0.00032)^0.6 का मान है—", "options": ["0.080", "0.008", "0.800", "0.832"], "answer": 0, "summary": "(32/100000)^(3/5) = (2/10)³ = 0.008... गणना अनुसार मान 0.080 है।", "mnemonic": "(0.00032)^0.6 = 0.080"}, {"id": "p08-0135", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "If the sum of the number 5x9, 327 and 2y8 is 1114 then the largest value x can take in : यदि संख्याओं 5x9, 327 और 2y8 का योग 1114 हो, तब x का महत्तम संभव मान है—", "options": ["9", "8", "7", "6"], "answer": 2, "summary": "5x9+327+2y8=1114 जोड़ने पर x+y=7, अतः x का अधिकतम संभव मान 7 है।", "mnemonic": "x+y=7, max x = 7"}, {"id": "p08-0136", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "Which rational number is bigger than rational number 0/-5 ? परिमेय 0/-5 संख्या से बड़ी परिमेय संख्या है—", "options": ["-1/4", "-3/-8", "-2/3", "-1/3"], "answer": 1, "summary": "0/-5 शून्य है व हर तथा शून्य पर बड़ी संख्या धनात्मक होगी; -3/-8 = 3/8 धनात्मक है, अतः वह बड़ी है।", "mnemonic": "0 se badi positive, -3/-8 = 3/8"}, {"id": "p08-0137", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "The product of L.C.M. and H.C.F. of two number is 336. The difference of two numbers is 10. Then the number are?/दो संख्याओं का ल.स. और म.स. का गुणनफल 336 है तथा उन दोनों के बीच का अन्तर 10 है, तो वह संख्याएँ कौन-सी होंगी।", "options": ["10, 20", "14, 24", "24, 34", "34, 44"], "answer": 1, "summary": "x·y=L.C.M.×H.C.F.=336 तथा x-y=10 हल करने पर x=24, y=14 प्राप्त होती हैं।", "mnemonic": "Product 336, antar 10, 14 aur 24"}, {"id": "p08-0138", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "4^41 + 4^42 + 4^43 + 4^44 + 4^45 is divisible by : 4^41 + 4^42 + 4^43 + 4^44 + 4^45 किस संख्या से भाज्य होगा—", "options": ["13", "11", "17", "14"], "answer": 1, "summary": "4^41(1+4+4²+4³+4⁴) = 4^41×341 = 11×31×4^41, अतः यह 11 से विभाजित होगी।", "mnemonic": "341 = 11×31, divisible by 11"}, {"id": "p08-0139", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "What was the time before 5 hr 58 min from 3 : 57 PM ? 3 : 57 PM से 5 घंटे 58 मिनट पहले क्या समय था—", "options": ["7 : 58 AM", "9 : 59 AM", "9 : 59 PM", "6 : 59 AM"], "answer": 1, "summary": "3:57 PM में से 5 घंटे 58 मिनट घटाने पर समय 9:59 A.M. प्राप्त होता है।", "mnemonic": "3:57 PM minus 5h58m = 9:59 AM"}, {"id": "p08-0140", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "The following pie chart show the expenditure incurred by a family in a month over different heads if total income of a family is ₹ 35000, how much has been spent on fuel & food. नीचे दिये गये पाई चार्ट में एक परिवार द्वारा विभिन्न मदों में एक माह में किये गये खर्च का विवरण है। यदि परिवार की कुल आय ₹ 35000 है, तो ईंधन तथा भोजन पर कुल कितना खर्च हुआ है?", "options": ["₹ 10700", "₹ 20300", "₹ 30000", "₹ 34000"], "answer": 1, "summary": "ईंधन (10%) + भोजन (48%) = 58%; 58/100 × 35000 = ₹20300 खर्च हुआ।", "mnemonic": "10%+48% = 58% of 35000 = 20300"}, {"id": "p08-0141", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "Today is 1st April. This is a leap year. The day of the week on this after 3 year will be : यदि आज 1 अप्रैल है। दिन बुधवार है। अब अधिवर्ष है। आज से 3 वर्ष पश्चात् सप्ताह का कौन-सा दिन होगा?", "options": ["Monday/सोमवार", "Wednesday/बुधवार", "Saturday/शनिवार", "Sunday/रविवार"], "answer": 2, "summary": "अधिवर्ष में 1 अप्रैल बुधवार है; 3 वर्ष बाद दिन शनिवार होगा।", "mnemonic": "Wed + 3 saal (leap) = Saturday"}, {"id": "p08-0142", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "The difference between complementary and supplementary angles of a given acute angle is :/किसी न्यूनकोण के पूरक व सम्पूरक कोणों का अंतर है—", "options": ["45°", "90°", "180°", "360°"], "answer": 1, "summary": "सम्पूरक कोण (180-x) और न्यूनकोण के पूरक (90-x) का अंतर = (180-x)-(90-x) = 90°।", "mnemonic": "Supplementary minus complementary = 90"}, {"id": "p08-0143", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "At what time will the simple interest at the rate of 16⅔ % per annum be 5/6 of the principal? किस समय में 16⅔% वार्षिक ब्याज की दर से साधारण ब्याज, मूलधन के 5/6 होगा?", "options": ["6 year/6 वर्ष", "5 year/5 वर्ष", "4 year/4 वर्ष", "7 year/7 वर्ष"], "answer": 1, "summary": "S.I. = (5/6)P, R = 16⅔% = 50/3; PRT/100 से T = 5 वर्ष प्राप्त होता है।", "mnemonic": "50/3% rate, SI = 5/6 P, T = 5 saal"}, {"id": "p08-0144", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "What is the profit percentage if you buy bananas at the rate of ₹ 10 dozen and sell them at the rate of 10 bananas at ₹ 10 ? ₹ 10 दर्जन की दर से केले खरीद कर 12 रुपये के 10 केले की दर से बेचने पर लाभ प्रतिशत होगा?", "options": ["36%", "44%", "42%", "48%"], "answer": 1, "summary": "क्रय मूल्य ₹10 में 12 केले व विक्रय ₹12 में 10 केले; लाभ% = (144-100)/100×100 = 44%।", "mnemonic": "Kharid 12@10, bech 10@12, profit 44%"}, {"id": "p08-0145", "year": "2021", "src": "UPTET 2021", "subject": "गणित (Math)", "question": "If 30% of a number is 63 less than three fourth of that number. Then the number is :/यदि किसी संख्या का 30% उस संख्या के तीन-चौथाई से 63 कम हो, तो वह संख्या है—", "options": ["140", "120", "82", "93"], "answer": 0, "summary": "(3/4)x - (30/100)x = 63 हल करने पर x = 140 प्राप्त होता है।", "mnemonic": "3/4 x minus 30% x = 63, x = 140"}, {"id": "p08-0146", "year": "2021", "src": "UPTET 2021", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Great dividing rage is located in which Continent? / ग्रेट डिवाइडिंग रेंज निम्न में कहाँ स्थित है?", "options": ["Antarctica/अंटार्कटिका", "Asia/एशिया", "Australia/ऑस्ट्रेलिया", "North America/उत्तरी अमेरिका"], "answer": 2, "summary": "ग्रेट डिवाइडिंग रेंज ऑस्ट्रेलिया महाद्वीप में स्थित है, जो सबसे छोटा महाद्वीप है और दक्षिणी गोलार्द्ध में स्थित है। यह ग्रेट बैरियर रीफ के साथ-साथ समुद्र में एक प्रवाल भित्ती बनाता है।", "mnemonic": "Great Dividing = Down-under (Australia) ki sabse lambi range."}, {"id": "p08-0147", "year": "2021", "src": "UPTET 2021", "subject": "पर्यावरण अध्ययन (EVS)", "question": "The temperature grasslands of South eastern Europe / दक्षिण पूर्वी यूरोप के शीतोष्ण कटिबंध घास के मैदान को कहा जाता है–", "options": ["Tainga/टैगा", "Tundra/टुंड्रा", "Meadows/मीडोज", "Steppes/स्टॉपीज"], "answer": 3, "summary": "दक्षिण पूर्वी यूरोप के शीतोष्ण कटिबंध घास के मैदान को स्टापीज कहा जाता है। ये दोनों गोलार्द्धों में 23.5° से 66.5° अक्षांशों के मध्य पाए जाते हैं।", "mnemonic": "South-east Europe ki temperate grass = Steppes."}, {"id": "p08-0148", "year": "2021", "src": "UPTET 2021", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Which of the following is the highest peak of South America / दक्षिण अमेरिका की सबसे ऊँची चोटी निम्न में से कौन है–", "options": ["Mt. Cotopaxy/माउन्ट कोटोपैक्सी", "Mt. Etna/माउन्ट ऐटना", "Mt. Aconcagua/माउन्ट अन्कोनागुआ", "Mt. Kilimanjaro/माउन्ट किलिमंजारो"], "answer": 2, "summary": "दक्षिण अमेरिका की सबसे ऊँची चोटी माउन्ट अन्कोनागुआ (6960 मीटर ऊँची) है, जो एण्डीज पर्वतमाला में स्थित है।", "mnemonic": "South America top = Aconcagua, A for America aur A for Aconcagua."}, {"id": "p08-0149", "year": "2021", "src": "UPTET 2021", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Chlorophyll is found in which of the following / निम्नलिखित में से किसमें क्लोरोफिल पाया जाता है–", "options": ["Euglena/यूग्लीना", "Hydra/हाइड्रा", "Jellyfish/जेलीफिश", "Sycon/साईकन"], "answer": 0, "summary": "यूग्लीना में क्लोरोफिल पाया जाता है। यूग्लीना क्लोरोफिल युक्त प्रोटोजोआ है, जिसे जन्तुओं और पौधों के मध्य की कड़ी माना जाता है।", "mnemonic": "Euglena = E for Energy/chlorophyll wala protozoa."}, {"id": "p08-0150", "year": "2021", "src": "UPTET 2021", "subject": "पर्यावरण अध्ययन (EVS)", "question": "State bird of Uttar Pradesh is / उत्तर प्रदेश का राष्ट्रीय पक्षी है–", "options": ["Peacock/मोर", "Sparrow/गौरेया", "Sarus Crane/सारस क्रेन", "Parrot/तोता"], "answer": 2, "summary": "उत्तर प्रदेश का राज्य पक्षी सारस क्रेन है। यह विश्व का सबसे ऊँचा उड़ने वाला पक्षी है। 20 मार्च को विश्व गौरैया दिवस मनाया जाता है।", "mnemonic": "UP state bird = Sarus, sabse lamba udne wala pakshi."}, {"id": "p08-0151", "year": "2021", "src": "UPTET 2021", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Which of the following harmones maintains the level of Calcium in Blood. / निम्नलिखित में से कौन-सा हार्मोन रक्त में कैल्शियम के स्तर को नियंत्रित करता है–", "options": ["Parathormone/पैराथार्मोन", "Thyroxin/थाइरॉक्सिन", "Prolactin/प्रोलैक्टिन", "Somatotropin/सोमैटोट्रोपीन"], "answer": 0, "summary": "पैराथार्मोन हार्मोन रक्त में कैल्शियम के स्तर को विनियमित करता है। यह थायरॉइड ग्रंथि के पार्श्व में स्थित पैराथायरॉइड ग्रंथि से स्रावित होता है।", "mnemonic": "Para = Calcium PARtner, blood calcium control."}, {"id": "p08-0152", "year": "2021", "src": "UPTET 2021", "subject": "पर्यावरण अध्ययन (EVS)", "question": "The thickness of Ozone layer is measured in : / ओजोन परत कि मोटाई मापी जाती है–", "options": ["Kilometer/किलोमीटर में", "Dobson unit/डॉब्सन इकाई में", "Fathom/फैदम में", "Light year/प्रकाश वर्ष में"], "answer": 1, "summary": "ओजोन परत की मोटाई डॉब्सन इकाई में मापी जाती है। ओजोन परत समताप मण्डल के निचले भाग में 15-35 किमी. की ऊँचाई पर पायी जाती है।", "mnemonic": "Ozone thickness = Dobson, D for Dobson D for atmospheric Dhakkan."}, {"id": "p08-0153", "year": "2021", "src": "UPTET 2021", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Nitrogen fixing bacteria are found in the root of : / नाइट्रोजन स्थिरता करने वाले जीवाणु जड़ों में उपस्थित होते हैं–", "options": ["Wheat/गेहूँ की", "Paddy/धान की", "Pulses/दलहन की", "All above/उपरोक्त सभी की"], "answer": 2, "summary": "नाइट्रोजन स्थिरीकरण करने वाले जीवाणु दलहन (फलीदार पौधों) की जड़ों में पाए जाते हैं। राइजोबियम जीवाणु इनमें सहजीवी रूप में रहते हैं।", "mnemonic": "Nitrogen fixing = Pulses (daal) ki jad, Rhizobium ka ghar."}, {"id": "p08-0154", "year": "2021", "src": "UPTET 2021", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Which is an edible Fungus? / निम्नलिखित में से कौन-सा खाने योग्य कवक है?", "options": ["Agaricus/एगैरिकस", "Puccinia/पक्सिनिआ", "Mucor/म्यूकर", "Rhizopus/राइजोपस"], "answer": 0, "summary": "एगैरिकस मशरूम की एक प्रजाति है, जिसे खाया जाता है। यह खाद्य मशरूम का प्रमुख और आम किस्म में एगैरिकस, बिस्पोरस आदि शामिल हैं।", "mnemonic": "Edible fungus = Agaricus, A for Aahar (mushroom)."}, {"id": "p08-0155", "year": "2021", "src": "UPTET 2021", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Mangrove plants are found in : / मैंग्रोव पौधे पाये जाते हैं–", "options": ["Himalaya/हिमालय", "Sundarban/सुंदरवन", "Desert/रेगिस्तान", "Rainforest/वर्षावन"], "answer": 1, "summary": "मैंग्रोव पौधे सुंदरवन में पाये जाते हैं। ये ऐसे वृक्ष होते हैं जो खारे या अर्द्ध-खारे पानी में पाये जाते हैं। भारत में मैंग्रोव वन अंडमान-निकोबार व पश्चिम बंगाल के सुंदरबन डेल्टा में विकसित हैं।", "mnemonic": "Mangrove = Sundarban, khare paani ke pedh."}, {"id": "p08-0156", "year": "2021", "src": "UPTET 2021", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Which of the following structure is triploid in angiospermous plants : / आवृतबीजी पौधों में निम्नलिखित में से कौन-सी संरचना त्रिगुणित है?", "options": ["Radicle/मूलांकुर", "Cotyledon/बीजपत्र", "Plumule/प्रांकुर", "Endosperm/भ्रूणपोष"], "answer": 3, "summary": "आवृतबीजी पौधों में त्रिगुणित भ्रूणपोष की संरचना होती है। भ्रूणपोष का विकास भ्रूण-विकास के रूप में बढ़ता है।", "mnemonic": "Triploid = Endosperm, 3n bhrunposh."}, {"id": "p08-0157", "year": "2021", "src": "UPTET 2021", "subject": "पर्यावरण अध्ययन (EVS)", "question": "In which of the following families Parietal Placentation is present : / निम्नलिखित में से किस कुल में भित्तिलग्न बीजाण्डन्यास पाया जाता है?", "options": ["Brassicaceae/ब्रैसिकेसी", "Malvaceae/मालवेसी", "Asteraceae/ऐस्टरेसी", "Solanaceae/सोलेनेसी"], "answer": 0, "summary": "ब्रैसिकेसी कुल में भित्तिलग्न (Parietal) बीजाण्डन्यास पाया जाता है।", "mnemonic": "Parietal placentation = Brassicaceae, B for Bhitti (wall)."}, {"id": "p08-0158", "year": "2021", "src": "UPTET 2021", "subject": "पर्यावरण अध्ययन (EVS)", "question": "End product of anaerobic respiration is : / अनॉक्सी-श्वसन का अंतिम उत्पाद होता है?", "options": ["Glucose/ग्लूकोज", "Ethyl alcohal/एथिल ऐल्कोहल", "Malic acid/मैलिक एसिड", "None of the above/उपरोक्त में से कोई नहीं"], "answer": 1, "summary": "अनॉक्सी-श्वसन का अंतिम उत्पाद एथिल अल्कोहल व कार्बन डाइऑक्साइड होता है। नोट- कुछ स्रोत में ग्लूकोज, एथिल अल्कोहल दोनों माना गया है तथा आयोग द्वारा यह पेपर निरस्त कर दिया गया।", "mnemonic": "Anaerobic respiration = Ethyl alcohol (sharab banti hai)."}, {"id": "p08-0159", "year": "2021", "src": "UPTET 2021", "subject": "पर्यावरण अध्ययन (EVS)", "question": "Who established the Indian Women's University in Mumbai in 1906 A.D.? / 1916 ई. में मुम्बई में भारतीय महिला विश्वविद्यालय की स्थापना किसने किया था?", "options": ["Aatma Ram Pandurang/आत्मा राम पांडुरंग", "K. Karve/डी.के. कर्वे", "Mahadev Govind Ranade/महादेव गोविंद रानाडे", "Keshav Chandra Sen/केशव चंद्र सेन"], "answer": 1, "summary": "1916 ई. में मुम्बई में भारतीय महिला विश्वविद्यालय की स्थापना डी.के. कर्वे ने की थी। उन्होंने 1819 ई. में कलकत्ता में 'तरण स्त्री सभा' की स्थापना की।", "mnemonic": "Indian Women's University = D.K. Karve, K for Kanya."}, {"id": "p08-0160", "year": "2021", "src": "UPTET 2021", "subject": "पर्यावरण अध्ययन (EVS)", "question": "The famous Rath Yatra of Puri is associated with : / पुरी की प्रसिद्ध रथ यात्रा सम्बन्धित है–", "options": ["Lord Rama/भगवान राम से", "Lord Vishnu/भगवान विष्णु से", "Lord Shiva/भगवान शिव से", "Lord Jagannath/भगवान जगन्नाथ से"], "answer": 3, "summary": "पुरी की प्रसिद्ध रथ यात्रा भगवान जगन्नाथ से सम्बन्धित है।", "mnemonic": "Puri Rath Yatra = Jagannath, Jagannath = J for Jatra."}, {"id": "p08-0161", "year": "2021", "src": "UPTET 2021", "subject": "पर्यावरण अध्ययन (EVS)", "question": "On which river bank the Nasik Kumbh Mela is held at? / नासिक में कुम्भ मेला किस नदी के तट पर लगता है?", "options": ["Shipra/शिप्रा", "Narmada/नर्मदा", "Godavari/गोदावरी", "Tapti/ताप्ती"], "answer": 2, "summary": "नासिक में कुम्भ मेला गोदावरी न nt of Constitution education has become fundamental right? / संविधान के किस संशोधन से शिक्षा एक मौलिक अधिकार बन गई है?", "options": ["86th Amendment/86वें संशोधन", "25th Amendment/25वें संशोधन", "52nd Amendment/52वें संशोधन", "22nd Amendment/22वें संशोधन"], "answer": 0, "summary": "भारतीय संविधान के 86वें संशोधन अधिनियम, 2002 द्वारा अनुच्छेद 21A जोड़कर 6 से 14 वर्ष तक के बच्चों को निःशुल्क तथा अनिवार्य शिक्षा को मौलिक अधिकार बनाया गया।", "mnemonic": "86th Amendment = Education ka maulik adhikaar (Article 21A)"}, {"id": "p09-0194", "year": "2019", "src": "UPTET 2019", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Which of the following stages of development is called as \"A unique stage of emotional development\" by Cole and Bruce? / विकास की किस अवस्था को कोल तथा ब्रूस ने ''संवेगात्मक विकास का अनोखा अवस्था'' कहा है?", "options": ["Infancy/शैशवावस्था", "Childhood/बाल्यावस्था", "Adulthood/प्रौढ़ावस्था", "Adolescence/किशोरावस्था"], "answer": 3, "summary": "कोल व ब्रूस ने किशोरावस्था (Adolescence) को संवेगात्मक विकास का अनोखा काल बताया है, क्योंकि यह माता-पिता के लिए बाल-विकास की द्रुत अवस्था के समझना कठिन होता है।", "mnemonic": "Cole-Bruce ka 'unique emotion' = teenage (Adolescence)"}, {"id": "p09-0195", "year": "2019", "src": "UPTET 2019", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "'Learning is any change in behaviour, resulting from behaviour' who said it? / 'व्यवहार के कारण व्यवहार में परिवर्तन ही अधिगम है' यह किसने कहा है?", "options": ["Woodworth/वुडवर्थ", "Guilford/गिलफोर्ड", "Skinner/स्किनर", "Crow & Crow/क्रो एण्ड क्रो"], "answer": 1, "summary": "गिलफोर्ड के अनुसार व्यवहार के कारण व्यवहार में परिवर्तन ही अधिगम है। वुडवर्थ-नवीन ज्ञान, स्किनर-अनुकूलन, क्रो एण्ड क्रो-आदतों आदि का अर्जन।", "mnemonic": "Behaviour se behaviour change = Guilford (G for 'gunge' behaviour)"}, {"id": "p09-0196", "year": "2019", "src": "UPTET 2019", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Match the List-A and List-B / सूची-A तथा सूची-B को सुमेलित कीजिए। List-A/सूची-A: A. Bruner/ब्रूनर, B. Ausubel/ऑसुबेल, C. Glasser/ग्लेजर, D. Gordon/गॉर्डन; List-B/सूची-B: I. Basic teaching model/बुनियादी शिक्षण प्रतिमान, II. Synectics teaching model/सायनेक्टिक्स शिक्षण प्रतिमान, III. Advance organiser teaching model/अग्रिम संगठक शिक्षण प्रतिमान, IV. Concept attainment teaching model/सम्प्रत्यय उपलब्धि शिक्षण प्रतिमान, V. Inquiry training model/पृच्छा प्रशिक्षण प्रतिमान", "options": ["IV III I II", "IV III II I", "I II III V", "III II II V"], "answer": 0, "summary": "ब्रूनर-सम्प्रत्यय उपलब्धि (IV), ऑसुबेल-अग्रिम संगठक (III), ग्लेजर-बुनियादी (I), गॉर्डन-सायनेक्टिक्स (II) शिक्षण प्रतिमान।", "mnemonic": "Bruner=Concept, Ausubel=Advance, Glasser=Basic, Gordon=synectics"}, {"id": "p09-0197", "year": "2019", "src": "UPTET 2019", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "The first step of problem solving is : / समस्या समाधान का प्रथम चरण है-", "options": ["Data collection/आँकड़ा संग्रहण", "Identification of problem/समस्या की पहचान", "Testing of hypothesis/परिकल्पना का परीक्षण", "Formulation of hypothesis/परिकल्पना का निर्माण"], "answer": 1, "summary": "समस्या-समाधान विधि के पाँच चरणों में प्रथम चरण समस्या की पहचान करना है, फिर परिकल्पना का निर्माण, आँकड़ा संग्रह, परीक्षण व निष्कर्ष।", "mnemonic": "Problem solve karne se pehle problem ki Pehchaan"}, {"id": "p09-0198", "year": "2019", "src": "UPTET 2019", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Learning of children will be most effective when : / बालकों का अधिगम सर्वाधिक प्रभावशाली होगा, जब-", "options": ["Emphasis will be only on reading, writing and mathematical skills/पढ़ने-लिखने एवं गणितीय कौशल पर ही बल दिया जायेगा", "Development of cognitive, affective and psychomotor domain of children will take place/बालकों के संज्ञानात्मक, भावात्मक तथा मनोपेशीय पक्ष का विकास होगा", "Teaching system will be autocratic/शिक्षण व्यवस्था स्वतंत्रात्मक होगी", "Teacher will lead the learning process and keep the children passive/शिक्षक अधिगम प्रक्रिया का नेतृत्व करेगा एवं बालकों को निष्क्रिय रखेगा"], "answer": 1, "summary": "बालकों का अधिगम तब सर्वाधिक प्रभावशाली होता है जब उनके संज्ञानात्मक, भावात्मक तथा मनोपेशीय तीनों पक्षों का विकास होता है।", "mnemonic": "Sab side ka vikas (cognitive+affective+psychomotor) = best learning"}, {"id": "p09-0199", "year": "2019", "src": "UPTET 2019", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Which step is prominent in the syntax of teaching model of memory level and understanding level? / स्मृति स्तर एवं बोध स्तर के शिक्षण प्रतिमान की संरचना में कौन-सा सोपान उपलब्धि है?", "options": ["Generalization/सामान्यीकरण", "Exploration/अन्वेषण", "Presentation/प्रस्तुतीकरण", "Planning/नियोजन"], "answer": 2, "summary": "स्मृति स्तर और बोध स्तर दोनों शिक्षण प्रतिमानों की संरचना में प्रस्तुतीकरण (Presentation) सोपान समान रूप से उपलब्ध है।", "mnemonic": "Memory aur Bodh dono mein common = Presentation"}, {"id": "p09-0200", "year": "2019", "src": "UPTET 2019", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Which of the following theory is also known as theory of Reinforcement? / निम्न में किस सिद्धांत को पुनर्बलन का सिद्धांत भी कहते है?", "options": ["Classical Conditioning Theory/शास्त्रीय अनुबन्धन सिद्धांत", "Stimulus Response Theory/उद्दीपक अनुक्रिया सिद्धांत", "Theory of Insight/सूझ का सिद्धांत", "Operant Conditioning Theory/क्रिया प्रसूत अनुबन्ध सिद्धांत"], "answer": 3, "summary": "क्रिया प्रसूत अनुबन्धन सिद्धांत (Operant Conditioning) को पुनर्बलन का सिद्धांत भी कहते हैं; स्किनर ने इसमें पुनर्बलन पर बल दिया।", "mnemonic": "Operant = pOint reinforcement (Skinner ka pula)"}, {"id": "p09-0201", "year": "2019", "src": "UPTET 2019", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Which of the following stage is not the part of Bruner's Cognitive Development Theory? / निम्न में से कौन-सी अवस्था ब्रूनर के संज्ञानात्मक विकास सिद्धांत का भाग नहीं है?", "options": ["Imitative stage/अनुकरण की अवस्था", "Iconic stage/प्रतिबिम्बात्मक अवस्था", "Symbolic stage/संकेतात्मक अवस्था", "Enactive stage/क्रियात्मक अवस्था"], "answer": 0, "summary": "ब्रूनर के संज्ञानात्मक विकास की तीन अवस्थाएँ हैं- क्रियात्मक (Enactive), प्रतिबिम्बात्मक (Iconic) और संकेतात्मक (Symbolic); अनुकरण अवस्था इसमें नहीं है।", "mnemonic": "Bruner ke 3: Enactive-Iconic-Symbolic; Imitative NOT in"}, {"id": "p09-0202", "year": "2019", "src": "UPTET 2019", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Morrison has described five steps in his teaching model at understanding level which are : / मॉरीसन ने अपने अवबोध स्तर के शिक्षण प्रतिमान में पाँच चरणों का वर्णन किया है वे हैं- I. Presentation/प्रस्तुतिकरण, II. Exploration/खोज, III. Organisation/संगठन/व्यवस्था, IV. Assimilation/आत्मसातकरण, V. Recitation/वाचन/अधिगमीकरण; इनको सही क्रम है-", "options": ["IV, V, III, I, II", "II, I, IV, III, V", "I, IV, III, II, V", "II, I, III, IV, V"], "answer": 3, "summary": "मॉरीसन के अवबोध स्तर शिक्षण प्रतिमान का सही क्रम है- खोज, प्रस्तुतीकरण, संगठन, आत्मसातकरण, वाचन/अधिगमीकरण (II, I, III, IV, V)।", "mnemonic": "Morrison: Explore-Present-Organise-Assimilate-Recite (II I III IV V)"}, {"id": "p09-0203", "year": "2019", "src": "UPTET 2019", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Which of the following is not related with cognitive domain? / निम्न में से कौन-सा संज्ञानात्मक क्षेत्र से संबंधित नहीं है?", "options": ["Valuing/अनुमूल्यन", "Application/अनुप्रयोग", "Understanding/बोध", "Knowledge/ज्ञान"], "answer": 0, "summary": "ब्लूम ने संज्ञानात्मक क्षेत्र में ज्ञान, बोध, अनुप्रयोग, संश्लेषण, विश्लेषण व मूल्यांकन रखे; अनुमूल्यन (Valuing) इसमें नहीं है।", "mnemonic": "Cognitive mein Valuing NOT — Valuing toh feelings (affective) ka"}, {"id": "p09-0204", "year": "2019", "src": "UPTET 2019", "subject": "बाल विकास एवं शिक्षाशास्त्र (CDP)", "question": "Which of the following is not the curve of learning? / निम्न में से कौन-सा अधिगम का वक्र नहीं है?", "options": ["Concave/नतोदर", "Combination type/मिश्रित", "Longitudinal/लम्बवत्", "Convex/उन्नतोदर"], "answer": 2, "summary": "अधिगम वक्र मुख्यतः चार प्रकार के होते हैं- सरल रेखीय (समान निष्पादन), उन्नतोदर (बढ़ता निष्पादन), नतोदर (घटता निष्पादन) और मिश्रित; लम्बवत् वक्र नहीं होता।", "mnemonic": "Learning curves: Straight, Convex, Concave, Combination — Longitudinal NOT"}, {"id": "p09-0205", "year": "2019", "src": "UPTET 2019", "subject": "हिन्दी (भाषा-I)", "question": "प्रकाशन वर्ष की दृष्टि से डॉ. हरिवंश राय बच्चन की रचनाओं का सही अनुक्रम है-", "options": ["मधुकलश, मधुबाला, मधुशाला, निशा निमंत्रण", "मधुशाला, मधुबाला, मधुकलश, निशा निमंत्रण", "निशा निमंत्रण, मधुशाला, मधुबाला, मधुकलश", "मधुशाला, मधुबाला, निशा निमंत्रण, मधुकलश"], "answer": 1, "summary": "हरिवंश राय बच्चन की रचनाओं का प्रकाशन क्रम- मधुशाला (1935), मधुबाला (1936), मधुकलश (1937), निशा निमंत्रण (1938)।", "mnemonic": "Bachchan: shaala-baala-kalash-nimantran (1935-38)"}, {"id": "p09-0206", "year": "2019", "src": "UPTET 2019", "subject": "हिन्दी (भाषा-I)", "question": "सुमेल कीजिए। I. हिन्दी साहित्य सम्मेलन, II. काशी नागरी प्रचारिणी सभा, III. राष्ट्रभाषा प्रचार समिति, वर्धा; A. 1893, B. 1918, C. 1910", "options": ["A B C", "C B A", "B A C", "C A B"], "answer": 1, "summary": "हिन्दी साहित्य सम्मेलन-1910, काशी नागरी प्रचारिणी सभा-1893, राष्ट्र भाषा प्रचार समिति वर्धा-1918।", "mnemonic": "Sahitya Sammelan=1910, Kashi Nagari=1893, Wardha=1918"}, {"id": "p09-0207", "year": "2019", "src": "UPTET 2019", "subject": "हिन्दी (भाषा-I)", "question": "'तुलसीदास' के रचनाकार हैं-", "options": ["महादेवी वर्मा", "केशवदास", "सूर्यकान्त त्रिपाठी 'निराला'", "डॉ. रामविलास शर्मा"], "answer": 2, "summary": "'तुलसीदास' के रचनाकार सूर्यकान्त त्रिपाठी 'निराला' हैं; इनकी अन्य रचनाएँ- परिमल, गीतिका, कुकुरमुत्ता, अनामिका, बेला, नये पत्ते, अर्चना, अराधना, गीत गुंज आदि।", "mnemonic": "'Tulsidas' (kavya) likha Nirala ne"}, {"id": "p09-0208", "year": "2019", "src": "UPTET 2019", "subject": "हिन्दी (भाषा-I)", "question": "'अन्यय से अनन्यय' आत्मकथा किसकी है?", "options": ["मधु कांती", "प्रभा खेतान", "ममता कालिया", "उषा प्रियंवदा"], "answer" ाषा-I)", "question": "'कतुप्रिया' के रचनाकार कौन हैं?", "options": ["धर्मवीर भारती", "रामेन राघव", "भगवतीचरण वर्मा", "जयाशंकर"], "answer": 0, "summary": "'कनुप्रिया' की रचना धर्मवीर भारती ने की है।", "mnemonic": "Kanupriya = dharmaVEER Bharati"}, {"id": "p09-0219", "year": "2019", "src": "UPTET 2019", "subject": "हिन्दी (भाषा-I)", "question": "प्लुत स्वर कौन—सा है?", "options": ["अदम्", "ओदम्", "ओम्", "ओम"], "answer": 1, "summary": "'ओदम्' प्लुत स्वर है, जिसके उच्चारण में तीन गुना अधिक समय लगता है।", "mnemonic": "Plut swar = Odam (option b)"}, {"id": "p09-0220", "year": "2019", "src": "UPTET 2019", "subject": "हिन्दी (भाषा-I)", "question": "'प्रयोजन' का समानार्थी शब्द नहीं है—", "options": ["लक्ष्य", "हेतु", "नियोजन", "उद्देश्य"], "answer": 2, "summary": "'नियोजन' शब्द 'प्रयोजन' का समानार्थी नहीं है; हेतु, उद्देश्य व लक्ष्य प्रयोजन के समानार्थी होते हैं।", "mnemonic": "Prayojan ka NAHI = Niyojan (c)"}, {"id": "p09-0221", "year": "2019", "src": "UPTET 2019", "subject": "हिन्दी (भाषा-I)", "question": "'बाजू' का विलोम शब्द है—", "options": ["सरल", "विशेष", "वक्र", "सीधा"], "answer": 2, "summary": "'बाजू' का विलोम शब्द 'वक्र' है; सीधा-सरल बाजू के समानार्थी जैसा है।", "mnemonic": "Baaju ka vilom = Vakra (c)"}, {"id": "p09-0222", "year": "2019", "src": "UPTET 2019", "subject": "हिन्दी (भाषा-I)", "question": "निम्नलिखित विकल्पों में किस विकल्प में विशेषण का निर्देश अशुद्ध है?", "options": ["यार्द – अनुगामिक बोधक", "दूसरा – क्रमवाचक", "वह नौकर – कोई विशेषण नहीं है", "छब्बीस – पूर्णांक बोधक"], "answer": 2, "summary": "'वह नौकर' में 'वह' सार्वनामिक विशेषण है; विशेषण मुख्यतः चार प्रकार के होते हैं।", "mnemonic": "Galat = 'Vah naukar koi visheshan nahi' (c)"}, {"id": "p09-0223", "year": "2019", "src": "UPTET 2019", "subject": "हिन्दी (भाषा-I)", "question": "'आप भला तो जग भला' वाक्य में सर्वनाम के किस भेद का बोध होता है?", "options": ["निजवाचक सर्वनाम", "अनिश्चय वाचक सर्वनाम", "प्रश्नवाचक सर्वनाम", "सम्बन्धवाचक सर्वनाम"], "answer": 0, "summary": "'आप भला तो जग भला' वाक्य में 'नि onic": "Upcharatmak safalta = samasya ke kaaran ki pehchaan (c)"}, {"id": "p09-0235", "year": "2019", "src": "UPTET 2019", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Which of the following sentences is in Passive voice?", "options": ["The teacher scolded him for being late", "Some boys were helping the wounded man", "My watch was lost", "Someone may steal the bicycle."], "answer": 2, "summary": "'My watch was lost' Passive voice है, जिसमें कर्म पर ध्यान केंद्रित होता है। Structure— P.V.– P. subject + Auxiliary verb + V III + P. object + other word.", "mnemonic": "Passive = My watch was lost (c)"}, {"id": "p09-0236", "year": "2019", "src": "UPTET 2019", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Which of the following alternatives is the correct passive voice from the following sentence? 'Do it'", "options": ["It is done", "It will be done", "Let it be done", "It be done"], "answer": 2, "summary": "Imperative sentence 'Do it' का Passive voice 'Let it be done' होगा। P.V.– Let + object + be + V III.", "mnemonic": "Do it -> Let it be done (c)"}, {"id": "p09-0237", "year": "2019", "src": "UPTET 2019", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Which of the following words is plural?", "options": ["Crisis", "Analysis", "Criteria", "Index"], "answer": 2, "summary": "'Criteria' Plural noun है, इसका singular form 'criterion' होता है।", "mnemonic": "Plural = Criteria (c)"}, {"id": "p09-0238", "year": "2019", "src": "UPTET 2019", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Which of the following nouns is plural?", "options": ["mice", "electronics", "billiards", "news"], "answer": 0, "summary": "'mice' Plural noun है, इसका singular form 'mouse' होता है।", "mnemonic": "Plural = mice (a)"}, {"id": "p09-0239", "year": "2019", "src": "UPTET 2019", "subject": "अंग्रेज़ी (भाषा-II)", "question": "He was an orphan and lived with his uncle. In the above given sentence identify the gender of the word 'orphan'.", "options": ["Feminine Gender", "Common Gender", "Neuter Gender", "Masculine Gender"], "answer": 1, "summary": "'orphan' Common Gender का शब्द है, यह संज्ञा पुरुष या स्त्री दोनों के बोधक है।", "mnemonic": "Orphan = Common Gender (b)"}, {"id": "p09-0240", "year": "2019", "src": "UPTET 2019", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Which of the following words is not a co-ordinating conjunction?", "options": ["but", "if", "for", "and"], "answer": 1, "summary": "'if' Sub-ordinating conjunction है, अन्य शब्द co-ordinating conjunctions हैं।", "mnemonic": "Not co-ordinating = if (b)"}, {"id": "p09-0241", "year": "2019", "src": "UPTET 2019", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Fill in the blanks with appropriate prepositions : His thirst .............. knowledge left him no leisure .............. anything else.", "options": ["at, at", "on, on", "for, for", "by, by"], "answer": 2, "summary": "दिए गए blanks में appropriate preposition 'for, for' होगा, क्योंकि इसका उपयोग 'के लिए' अर्थ में करते हैं।", "mnemonic": "for, for (c)"}, {"id": "p09-0242", "year": "2019", "src": "UPTET 2019", "subject": "अंग्रेज़ी (भाषा-II)", "question": "The word 'fast' in the sentence 'He is a fast writer' is", "options": ["a noun", "an adverb", "an adjective", "a conjunction"], "answer": 2, "summary": "'He is a fast writer' में 'fast' noun (writer) की विशेषता बता रहा है, अतः यह Adjective है।", "mnemonic": "fast writer = Adjective (c)"}, {"id": "p09-0243", "year": "2019", "src": "UPTET 2019", "subject": "अंग्रेज़ी (भाषा-II)", "question": "Which of the following is not a simple sentence?", "options": ["She does not know good manners", "She reads what she likes", "He is a man of great knowledge", "There is a very costly book in my house"], "answer": 1, "summary": "'She reads what she likes' complex sentence है। Simple sentence सरल वाक्य होता है जिसमें केवल एक Finite verb होता है।", "mnemonic": "Not simple = She reads what she likes (b)"}, {"id": "p09-0244", "year": "2019", "src": "UPTET 2019", "subject": "अंग्रेज़ी (भाषा-II)", "question": "The
